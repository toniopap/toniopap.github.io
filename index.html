<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio sulle Preferenze Alimentari</title>
  <style>
    /* ================================================================
       RESET E VARIABILI CSS
       Sistema di design token: colori, bordi e raggi definiti come
       variabili CSS e sovrascritti automaticamente in dark mode.
    ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* Tre livelli di sfondo (bg < bg-sec < bg-ter = sfondo pagina) */
      --bg: #ffffff; --bg-sec: #f6f5f2; --bg-ter: #eeedea;
      --bg-success: #eaf3de;
      /* Testo: primario (corpo), secondario (sub), terziario (label piccole) */
      --text-pri: #1a1a18; --text-sec: #5c5c58; --text-ter: #9a9a94;
      --text-success: #2d7a4f; --text-info: #1a5fa0;
      /* Bordi a tre livelli di visibilità */
      --border-lo: rgba(0,0,0,0.09); --border-mid: rgba(0,0,0,0.17); --border-hi: rgba(0,0,0,0.28);
      --r-md: 8px; --r-lg: 12px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    /* Sovrascrittura automatica per dark mode di sistema */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg-sec: #252523; --bg-ter: #2e2e2b;
        --bg-success: #173404;
        --text-pri: #f0ede8; --text-sec: #a8a8a2; --text-ter: #6a6a64;
        --text-success: #5ec98a; --text-info: #6aabee;
        --border-lo: rgba(255,255,255,0.08); --border-mid: rgba(255,255,255,0.15); --border-hi: rgba(255,255,255,0.26);
      }
    }

    /* ================================================================
       LAYOUT GLOBALE E CONTENITORI
    ================================================================ */
    body { font-family: var(--font); background: var(--bg-ter); color: var(--text-pri); min-height: 100vh; padding: 2rem 1rem 6rem; font-size: 15px; line-height: 1.6; }
    /* .screen-center: centramento verticale per le schermate welcome/end */
    .screen-center { display: flex; align-items: flex-start; justify-content: center; padding-top: 1rem; }
    .welcome-card { background: var(--bg); border: 0.5px solid var(--border-lo); border-radius: var(--r-lg); padding: 2.5rem 2rem; max-width: 640px; width: 100%; }
    /* .form-wrap / .stim-wrap: contenitori centrati per i form e gli stimoli */
    .form-wrap, .stim-wrap { max-width: 660px; margin: 0 auto; }

    /* ================================================================
       TIPOGRAFIA
    ================================================================ */
    h1 { font-size: 22px; font-weight: 600; margin: 0.6rem 0 1rem; line-height: 1.3; }
    h2 { font-size: 18px; font-weight: 600; margin: 0.5rem 0 0.5rem; }
    .sub { font-size: 14px; color: var(--text-sec); margin-bottom: 1.2rem; line-height: 1.5; }
    .section-header { margin-bottom: 1.5rem; }
    .section-title { font-size: 11px; font-weight: 600; color: var(--text-ter); letter-spacing: 0.09em; text-transform: uppercase; margin: 1.75rem 0 0.9rem; }
    /* Badge colorato in testa a ogni sezione (es. "Sezione C – FCQ") */
    .study-badge { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; background: var(--bg-sec); color: var(--text-ter); padding: 4px 10px; border-radius: 20px; margin-bottom: 0.4rem; }
    .study-badge.ok { background: var(--bg-success); color: var(--text-success); }
    .welcome-text { font-size: 15px; color: var(--text-sec); margin-bottom: 1rem; line-height: 1.65; }
    .welcome-text strong { color: var(--text-pri); }
    .info-row { display: flex; gap: 1.5rem; margin: 1.2rem 0; flex-wrap: wrap; }
    .info-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-sec); }

    /* ================================================================
       COMPONENTI INFORMATIVI (box GDPR, consenso)
    ================================================================ */
    .debrief-box { background: var(--bg-sec); border-radius: var(--r-md); padding: 1rem 1.25rem; margin: 1rem 0; font-size: 13px; color: var(--text-sec); line-height: 1.6; }
    .debrief-box p { margin-top: 6px; }
    .debrief-box p:first-child { margin-top: 0; }
    .debrief-title { font-weight: 600; color: var(--text-pri); margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
    .debrief-box strong { color: var(--text-pri); }
    .debrief-box a { color: var(--text-info); }
    .debrief-box ul { margin: 6px 0 0 1.2rem; }
    .debrief-box li { margin-bottom: 3px; }
    .consent-label { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; color: var(--text-sec); line-height: 1.5; background: var(--bg-sec); border-radius: var(--r-md); padding: 12px; margin-bottom: 1.25rem; cursor: pointer; }
    .consent-label input[type=checkbox] { margin-top: 2px; flex-shrink: 0; cursor: pointer; accent-color: var(--text-pri); }

    /* ================================================================
       CAMPI DEL FORM (input, select, textarea)
    ================================================================ */
    .field-group { margin-bottom: 1.4rem; }
    .field-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .field-row .field-group { flex: 1; min-width: 160px; }
    .field-label { display: block; font-size: 14px; font-weight: 500; color: var(--text-pri); margin-bottom: 8px; line-height: 1.4; }
    select { width: 100%; padding: 9px 12px; font-size: 14px; font-family: var(--font); color: var(--text-pri); background: var(--bg); border: 0.5px solid var(--border-mid); border-radius: var(--r-md); height: 40px; cursor: pointer; transition: border-color 0.15s; }
    select:focus { outline: none; border-color: var(--border-hi); }
    textarea { width: 100%; padding: 9px 12px; font-size: 14px; font-family: var(--font); color: var(--text-pri); background: var(--bg); border: 0.5px solid var(--border-mid); border-radius: var(--r-md); min-height: 76px; resize: vertical; line-height: 1.5; transition: border-color 0.15s; }
    textarea:focus { outline: none; border-color: var(--border-hi); }
    input[type=number], input[type=text] { width: 100%; padding: 9px 12px; font-size: 14px; font-family: var(--font); color: var(--text-pri); background: var(--bg); border: 0.5px solid var(--border-mid); border-radius: var(--r-md); transition: border-color 0.15s; }
    input[type=number]:focus, input[type=text]:focus { outline: none; border-color: var(--border-hi); }

    /* ================================================================
       BOTTONI RADIO E SCALA LIKERT
       .radio-btn: opzioni a scelta singola (stile button, non <input>)
       .lk-btn:    punti della scala Likert in griglia orizzontale
       La classe .selected colora il bottone scelto in nero/bianco invertito.
    ================================================================ */
    .radio-group { display: flex; flex-direction: column; gap: 6px; }
    .radio-btn { text-align: left; padding: 10px 14px; font-size: 14px; font-family: var(--font); color: var(--text-pri); background: var(--bg); border: 0.5px solid var(--border-mid); border-radius: var(--r-md); cursor: pointer; transition: all 0.12s; }
    .radio-btn:hover { background: var(--bg-sec); border-color: var(--border-hi); }
    .radio-btn.selected { background: var(--text-pri); color: var(--bg); border-color: var(--text-pri); font-weight: 500; }
    .scale-item { padding: 0.9rem 0; border-bottom: 0.5px solid var(--border-lo); }
    .scale-item:last-child { border-bottom: none; }
    .scale-construct { font-size: 11px; font-weight: 600; color: var(--text-ter); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
    .scale-question { font-size: 14px; color: var(--text-pri); margin-bottom: 8px; line-height: 1.4; }
    .question-text { font-size: 15px; color: var(--text-pri); margin-bottom: 8px; line-height: 1.45; }
    .likert-labels { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .likert-label { font-size: 11px; color: var(--text-ter); max-width: 120px; line-height: 1.3; }
    .likert-label:last-child { text-align: right; }
    .likert-buttons { display: flex; gap: 4px; }
    .lk-btn { flex: 1; height: 36px; border: 0.5px solid var(--border-mid); border-radius: var(--r-md); background: var(--bg); cursor: pointer; font-size: 13px; font-family: var(--font); color: var(--text-sec); transition: all 0.12s; }
    .lk-btn:hover { border-color: var(--border-hi); background: var(--bg-sec); }
    .lk-btn.selected { background: var(--text-pri); color: var(--bg); border-color: var(--text-pri); font-weight: 600; }

    /* ================================================================
       BARRA DI AVANZAMENTO
    ================================================================ */
    .progress-bar-wrap { margin-bottom: 1.75rem; }
    .progress-meta { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .progress-label { font-size: 12px; color: var(--text-ter); letter-spacing: 0.07em; text-transform: uppercase; }
    .progress-track { height: 3px; background: var(--border-lo); border-radius: 2px; }
    .progress-fill { height: 3px; background: var(--text-sec); border-radius: 2px; transition: width 0.4s ease; }

    /* ================================================================
       NAVIGAZIONE E BOTTONI PRINCIPALI
    ================================================================ */
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 0.5px solid var(--border-lo); }
    .nav-hint { font-size: 13px; color: var(--text-ter); transition: color 0.2s; }
    .nav-hint.complete { color: var(--text-success); }
    .btn-primary { padding: 10px 26px; font-size: 14px; font-weight: 600; font-family: var(--font); background: var(--text-pri); color: var(--bg); border: none; border-radius: var(--r-md); cursor: pointer; transition: opacity 0.15s; }
    .btn-primary:disabled { opacity: 0.28; cursor: not-allowed; }
    .btn-primary:not(:disabled):hover { opacity: 0.78; }
    .btn-secondary { padding: 10px 20px; font-size: 14px; font-weight: 500; font-family: var(--font); background: var(--bg); color: var(--text-pri); border: 0.5px solid var(--border-mid); border-radius: var(--r-md); cursor: pointer; transition: background 0.15s; display: inline-block; margin-top: 0.75rem; }
    .btn-secondary:hover { background: var(--bg-sec); }
    .warn-box { margin-top: 8px; font-size: 13px; color: #c0392b; padding: 8px 12px; background: #fdf0f0; border-radius: 6px; border: 1px solid #f5c6cb; }
    .check-label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; padding: 9px 12px; background: var(--bg); border: 0.5px solid var(--border-mid); border-radius: var(--r-md); margin-bottom: 5px; transition: background 0.12s; }
    .check-label:hover { background: var(--bg-sec); }
    .check-label input[type=checkbox] { cursor: pointer; accent-color: var(--text-pri); flex-shrink: 0; }

    /* ================================================================
       CARD STIMULUS E QR BADGE
       Il .qr-badge è posizionato in sovrimpressione sull'immagine
       solo quando il prodotto ha hasQR=true.
    ================================================================ */
    .stimulus-card { background: var(--bg); border: 0.5px solid var(--border-lo); border-radius: var(--r-lg); overflow: hidden; margin-bottom: 1.5rem; }
    .stimulus-img { width: 100%; height: 240px; display: flex; align-items: center; justify-content: center; background: var(--bg-sec); position: relative; }
    .stimulus-meta { padding: 1rem 1.25rem; border-top: 0.5px solid var(--border-lo); }
    .stimulus-hint { font-size: 14px; color: var(--text-sec); line-height: 1.5; }
    .qr-note { display: inline-block; margin-top: 5px; font-size: 12px; color: var(--text-info); cursor: pointer; }
    .qr-badge { position: absolute; bottom: 14px; right: 14px; width: 50px; height: 50px; background: white; border-radius: 8px; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.14s, box-shadow 0.14s; appearance: none; padding: 0; }
    .qr-badge:hover { transform: scale(1.06); box-shadow: 0 2px 12px rgba(0,0,0,0.12); }

    /* ================================================================
       MODAL QR INLINE
       Overlay che mostra la pagina del prodotto in un iframe senza
       lasciare il survey. Nascosto di default, aperto da openQRModal().
    ================================================================ */
    #qr-modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.70); align-items: flex-start; justify-content: center; padding: 0.75rem; }
    #qr-modal.open { display: flex; }
    .qr-modal-inner { width: 100%; max-width: 980px; height: 92vh; background: #fff; border-radius: var(--r-lg); overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 8px 40px rgba(0,0,0,0.35); margin-top: 0.5rem; }
    .qr-modal-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: var(--text-pri); flex-shrink: 0; gap: 1rem; }
    .qr-modal-bar p { color: var(--bg); font-size: 13px; opacity: 0.80; }
    #btn-close-qr { color: var(--bg); background: none; border: 0.5px solid rgba(255,255,255,0.40); border-radius: var(--r-md); padding: 7px 16px; font-size: 13px; font-family: var(--font); font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    #btn-close-qr:hover { background: rgba(255,255,255,0.12); }
    #qr-iframe { flex: 1; border: none; width: 100%; }

    /* ================================================================
       SLIDER DISPONIBILITÀ A PAGARE (WTP – Willingness To Pay)
       Range 0–1200 centesimi (€0–€12), step 10 ct.
    ================================================================ */
    .wtp-wrap { margin-top: 1.5rem; }
    .wtp-slider-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .wtp-bound { font-size: 13px; color: var(--text-ter); white-space: nowrap; }
    input[type=range] { flex: 1; accent-color: var(--text-pri); cursor: pointer; height: 20px; }
    .wtp-value { font-size: 16px; font-weight: 600; color: var(--text-pri); min-width: 60px; text-align: right; }

    /* ================================================================
       TOAST – notifica temporanea sovrapposta (3 secondi)
    ================================================================ */
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 1000; background: var(--bg); border: 0.5px solid var(--border-mid); border-radius: var(--r-md); padding: 12px 16px; font-size: 13px; color: var(--text-pri); box-shadow: 0 4px 20px rgba(0,0,0,0.10); opacity: 0; pointer-events: none; transition: opacity 0.2s; max-width: 290px; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<!-- Contenitore unico: ogni schermata viene iniettata qui tramite innerHTML -->
<div id="app"></div>
<!-- Notifica toast sovrapposta, mostrata/nascosta da showToast() -->
<div id="toast"></div>
<!-- Modal QR inline: aperto da openQRModal(), chiuso da closeQRModal() -->
<div id="qr-modal">
  <div class="qr-modal-inner">
    <div class="qr-modal-bar">
      <p>Leggi le informazioni sul prodotto, poi chiudi per continuare il questionario.</p>
      <button id="btn-close-qr" onclick="closeQRModal()">✕ Chiudi e torna al questionario</button>
    </div>
    <iframe id="qr-iframe" src="" title="Informazioni prodotto"></iframe>
  </div>
</div>
<script>
/* ================================================================
   STRUTTURA DEL FILE JS
   ─────────────────────────────────────────────────────────────────
   1.  CONFIGURAZIONE ESPERIMENTO  – URL, condizioni, ordini
   2.  PRODOTTI                    – filler + prodotto focale con/senza QR
   3.  SCALE STIMOLI               – item valutati per ogni prodotto
   4.  SCALE QUESTIONARIO          – strumenti psicometrici:
         FCQ   Food Choice Questionnaire
         ISD   Internet Search Dependence
         TRUST Fiducia nelle istituzioni alimentari
         CNS   Consumer Need for Stimulation
         TAM   Technology Acceptance Model (QR)
         MAVEN Market Maven scale
         ENJOY Perceived Enjoyment (QR)
   5.  STATO GLOBALE               – oggetto S + initSession()
   6.  ILLUSTRAZIONI PRODOTTI      – illo() + QR_SVG inline
   7.  UTILITY / RENDER HELPERS    – progressBar, radioGroup, renderLikert*
   8.  EVENT HANDLERS QUESTIONARIO – onRadio, onLikert, onHealthCheck
   9.  EVENT HANDLERS STIMOLI      – onStimulusLikert, checkStimulusDone, onQrClick
   10. EVENT HANDLERS POST         – onRadioPost, togglePostQR, onPostLikert
   11. SCREENS                     – funzioni che restituiscono HTML di ogni schermata
   12. NAVIGAZIONE                 – SCREENS map, goTo(), goToStimulus()
   13. SALVATAGGIO DATI            – saveData() (localStorage), downloadData()
   14. TOAST                       – showToast()
   15. BOOTSTRAP                   – initSession() + goTo('welcome')
   16. DEV NAV                     – barra di salto rapido (solo con ?dev nell'URL)
================================================================ */

/* ================================================================
   1. CONFIGURAZIONE ESPERIMENTO
   ─────────────────────────────────────────────────────────────────
   STUDY_URL  : base URL della landing page raggiunta scansionando il QR.
   CONDITIONS : tre varianti del contenuto QR (tracciabilità / nutrizione /
                sostenibilità); assegnata casualmente a ogni partecipante.
   ORDERS     : ordine del prodotto focale nella sequenza.
                'A' = prima senza QR poi con QR; 'B' = inverso.
================================================================ */
const STUDY_URL  = 'https://toniopap.github.io/';
const CONDITIONS = ['V3_Nutraceutiche', 'V4_Pascolo', 'V5_Maturazione']; // etichette per le tre varianti del QR code
const ORDERS     = ['A', 'B'];

/* GAS_URL: incollare qui l'URL del Web App dopo il deploy su Google Apps Script.
   Lasciare stringa vuota durante sviluppo locale (submitData() non farà nulla). */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyl1xPGf-h1HIUe2NB6IyvVzkT2A9uMdm-Z8nljqaiYAEBuNgpbkN3Xks8XcFldm8Y1/exec';


/* ================================================================
   2. PRODOTTI (esperimento packaging)
   ─────────────────────────────────────────────────────────────────
   FILLERS   : 4 prodotti distrattori senza QR (yogurt, pasta, passata, olio).
   FOCAL_NO  : prodotto focale (fettine di vitello) SENZA QR → controllo.
   FOCAL_QR  : stessa referenza CON QR → trattamento.
   Sequenza finale: filler[0], filler[1], focale_X, filler[2], focale_Y, filler[3]
   dove X/Y dipendono dall'ordine A o B assegnato alla sessione.
================================================================ */
const FILLERS = [
  { id: 'yogurt',  name: 'Yogurt Greco',        brand: 'COOP', detail: '500g · Naturale',         type: 'yogurt',  hasQR: false },
  { id: 'pasta',   name: 'Pasta di Gragnano',   brand: 'COOP', detail: '500g · Spaghetti n.12',   type: 'pasta',   hasQR: false },
  { id: 'passata', name: 'Passata di Pomodoro', brand: 'COOP', detail: '700g · Rustica',           type: 'passata', hasQR: false },
  { id: 'olio',    name: 'Olio Extravergine',   brand: 'COOP', detail: '750ml · Classico',         type: 'olio',    hasQR: false },
];
const FOCAL_NO = { id: 'carne_no_qr', name: 'Fettine di Vitello', brand: 'Linea Natura', detail: '500g · Fresco · IT', type: 'carne', hasQR: false };
const FOCAL_QR = { id: 'carne_qr',   name: 'Fettine di Vitello', brand: 'Linea Natura', detail: '500g · Fresco · IT', type: 'carne', hasQR: true  };

/* ================================================================
   3. SCALE STIMOLI
   ─────────────────────────────────────────────────────────────────
   Per ogni prodotto della sequenza vengono somministrate 6 domande
   Likert 1–7 che misurano: qualità percepita (2 item), sicurezza
   alimentare, fiducia nella provenienza, trasparenza e intenzione d'acquisto.
================================================================ */
const PROD_SCALES = [
  { id: 'q_quality1', label: 'Qualità percepita',     q: 'Mi aspetto che questo prodotto sia buono.'                        },
  { id: 'q_quality2', label: 'Qualità percepita',     q: 'Mi aspetto che questo prodotto sia fresco.'                        },
  { id: 'q_safety',   label: 'Sicurezza alimentare',  q: 'Questo prodotto mi sembra sicuro da consumare.'                    },
  { id: 'q_trust',    label: 'Fiducia',               q: 'Mi fido della provenienza di questo prodotto.'                     },
  { id: 'q_transp',   label: 'Trasparenza',           q: 'Il produttore sembra voler essere trasparente con il consumatore.' },
  { id: 'q_intent',   label: "Intenzione d'acquisto", q: "Sarei propenso/a ad acquistare questo prodotto."                   },
];

/* ================================================================
   4. SCALE QUESTIONARIO
   ─────────────────────────────────────────────────────────────────
   Strumenti psicometrici validati usati come covariate/moderatori.
================================================================ */

/* FCQ – Food Choice Questionnaire (Steptoe et al., 1995)
   11 item che misurano l'importanza attribuita a varie caratteristiche
   del cibo nelle scelte alimentari quotidiane. Scala Likert 1–7. */
const FCQ_ITEMS = [
  { id:'fcq1',  q:'…sia sano.' },
  { id:'fcq2',  q:'…sia un modo per gestire il mio umore (es. mettermi di buon umore o per affrontare lo stress)' },
  { id:'fcq3',  q:"…sia comodo (nell'acquisto e nella preparazione)" },
  { id:'fcq4',  q:'…mi offra sensazioni piacevoli (es. consistenza, aspetto, odore e sapore)' },
  { id:'fcq5',  q:'…sia naturale' },
  { id:'fcq6',  q:'…sia economicamente conveniente.' },
  { id:'fcq7',  q:'…mi aiuti a controllare il peso.' },
  { id:'fcq8',  q:'…mi sia familiare.' },
  { id:'fcq9',  q:"…sia rispettoso dell'ambiente." },
  { id:'fcq10', q:'…sia rispettoso degli animali.' },
  { id:'fcq11', q:'…sia prodotto nel rispetto del commercio equo.' },
];

/* ISD – Internet Search Dependence scale
   12 item sulla tendenza a delegare a Internet la ricerca di informazioni
   e la memorizzazione di conoscenze. Scala 0–4 (Mai → Sempre). */
const ISD_ITEMS = [
  { id:'isd1',  q:'Di fronte a questioni controverse, preferisco cercare prima su Google piuttosto che pensarci da solo/a.' },
  { id:'isd2',  q:"Non prendo nota se so che posso cercare l'informazione su Internet." },
  { id:'isd3',  q:'Quando mi viene posta una domanda complessa, di solito cerco di estrarne le parole chiave.' },
  { id:'isd4',  q:"Quando qualcuno non è d'accordo con me, di solito cerco la risposta su Internet." },
  { id:'isd5',  q:'Penso che non sia necessario ricordare qualcosa se possiamo trovarlo tramite una ricerca su Internet.' },
  { id:'isd6',  q:'Quando qualcuno mi fa una domanda, cerco su Internet se non riesco a rispondere immediatamente.' },
  { id:'isd7',  q:'Riesco a estrarre rapidamente parole chiave da una frase per una potenziale ricerca su Internet.' },
  { id:'isd8',  q:'Mi innervosisco se non riesco a trovare una risposta a una domanda complessa tramite ricerca su Internet.' },
  { id:'isd9',  q:'Penso che la ricerca su Internet possa soddisfare i bisogni quotidiani, inclusi l\'apprendimento e il modo di vivere.' },
  { id:'isd10', q:'Di solito inizio a cercare online inconsapevolmente quando sono inattivo/a.' },
  { id:'isd11', q:"Non sono sicuro/a della risposta nella mia memoria se non riesco a verificarla tramite ricerca su Internet." },

/* ================================================================
   5. STATO GLOBALE
   ─────────────────────────────────────────────────────────────────
   S         : unico oggetto che accumula tutte le risposte della sessione.
               Serializzato in JSON al termine e salvato in localStorage.
   checkDone : puntatore alla funzione di validazione della schermata
               corrente; viene azzerato a ogni cambio di schermata.
================================================================ */
let S = {};
let checkDone = null;

/* initSession()
   Inizializza una nuova sessione sperimentale:
   – assegna casualmente condizione (tipo di QR) e ordine dei prodotti
   – genera un participant ID univoco basato sul timestamp (base-36)
   – costruisce la sequenza dei 4 prodotti interleaving filler e focali
   – prepara S con tutte le sotto-strutture pronte a ricevere risposte */
function initSession() {
  const condition = CONDITIONS[Math.floor(Math.random() * 3)];
  const order     = ORDERS[Math.floor(Math.random() * 2)];
  const pid       = 'P' + Date.now().toString(36).toUpperCase();

  /* Ordine A: prima senza QR (posizione 2), poi con QR (posizione 4); B è inverso */
  const fA  = order === 'A' ? FOCAL_NO : FOCAL_QR;
  const fB  = order === 'A' ? FOCAL_QR : FOCAL_NO;
  const seq = [FILLERS[0], fA, FILLERS[2], fB];

  S = {
    pid,
    participant_id: pid,
    condition,
    order,
    started_at: new Date().toISOString(),
    sequence: seq,
    screening: {},          // risposte sezione A (screening)
    section_b: {},          // risposte sezione B (abitudini d'acquisto)
    fcq: {},                // risposte FCQ
    isd: {},                // risposte ISD
    trust: {},              // risposte scala fiducia
    stimuli: seq.map(p => ({
      stimulus_id:  p.id,
      has_qr:       p.hasQR,
      shown_at:     null,   // timestamp ms di quando la card è stata mostrata
      exposure_ms:  null,   // durata esposizione ms (calcolata al completamento scale)
      qr_clicked:   false,
      qr_click_ts:  null,
      responses:    {},     // risposte PROD_SCALES per questo prodotto
      wtp:          0,    // WTP in centesimi (default €0,00)
    })),
    post:         {},       // risposte post-esposizione
    section_d:    {},       // risposte sezioni E (QR basic, CNS, TAM, Maven, Enjoy)
    demographics: { health: [] },
    completed_at: null,
  };
}

/* ================================================================
   7. UTILITY – RENDER HELPERS
   ─────────────────────────────────────────────────────────────────
   Funzioni che generano HTML riutilizzabile per barra di avanzamento,
   bottoni radio e griglie Likert in vari formati.
================================================================ */

/* Numero totale di sezioni (denominatore per il calcolo della percentuale) */
const TOTAL_SECTIONS = 12;

/* progressBar(section, label)
   Restituisce l'HTML della barra di avanzamento orizzontale.
   – section : numero sezione corrente (1–TOTAL_SECTIONS)
   – label   : etichetta opzionale; default "Sezione X di TOTAL_SECTIONS" */
function progressBar(section, label) {
  const pct = Math.round((section / TOTAL_SECTIONS) * 100);
  const lbl = label || `Sezione ${section} di ${TOTAL_SECTIONS}`;
  return `<div class="progress-bar-wrap">
    <div class="progress-meta">
      <span class="progress-label">${lbl}</span>
      <span class="progress-label">${pct}%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;
}

/* radioGroup(groupId, opts, storeKey, subKey, extra)
   Genera un gruppo di bottoni radio implementati come <button> (non <input>).
   – groupId  : id del contenitore (serve a onRadio per deselezionare gli altri)
   – opts     : array di stringhe – etichette delle opzioni
   – storeKey : chiave di primo livello in S (es. 'screening')
   – subKey   : chiave di secondo livello (es. 'responsible')
   – extra    : JS opzionale da eseguire dopo il click (es. mostrare un avviso) */
function radioGroup(groupId, opts, storeKey, subKey, extra) {
  extra = extra || '';
  return `<div class="radio-group" id="${groupId}">
    ${opts.map(o => `<button class="radio-btn"
      onclick="onRadio('${groupId}','${storeKey}','${subKey}','${o.replace(/'/g,"\\'")}',this)${extra}">${o}</button>`).join('')}
  </div>`;
}

/* renderLikert(items, storeKey, n, lowLabel, highLabel, showGroups)
   Genera la griglia Likert standard per una lista di item.
   – items     : array { id, q, [label], [group] }
   – storeKey  : chiave di primo livello in S
   – n         : numero di punti scala (es. 5 o 7)
   – lowLabel  : etichetta estremo sinistro
   – highLabel : etichetta estremo destro
   – showGroups: se true, inserisce un'intestazione quando item.group cambia */
function renderLikert(items, storeKey, n, lowLabel, highLabel, showGroups) {
  let lastGroup = null;
  return items.map(item => {
    let header = '';
    if (showGroups && item.group !== lastGroup) {
      lastGroup = item.group;
      header = `<div class="section-title" style="margin-top:1.5rem">${item.group}</div>`;
    }
    const labelHtml = item.label ? `<div class="scale-construct">${item.label}</div>` : '';
    const vals = Array.from({length: n}, (_, i) => i + 1);
    return `${header}<div class="scale-item">
      ${labelHtml}
      <p class="scale-question">${item.q}</p>
      <div class="likert-labels">
        <span class="likert-label">${lowLabel}</span>
        <span class="likert-label">${highLabel}</span>
      </div>
      <div class="likert-buttons" id="btns-${item.id}">
        ${vals.map(v => `<button class="lk-btn" onclick="onLikert('${storeKey}','${item.id}',${v},this)">${v}</button>`).join('')}
      </div>
    </div>`;
  }).join('');
}

/* renderLikert0(items, storeKey)
   Variante di renderLikert per scale 0–4 (usata per ISD).
   Mostra valori [0,1,2,3,4] con etichette "Mai (0)" / "Sempre (4)"
   e prefisso numerico ordinale prima del testo della domanda. */
function renderLikert0(items, storeKey) {
  return items.map((item, idx) => `
    <div class="scale-item">
      <p class="scale-question"><span class="scale-construct">${idx + 1}.</span> ${item.q}</p>
      <div class="likert-labels">
        <span class="likert-label">Mai (0)</span>
        <span class="likert-label">Sempre (4)</span>
      </div>
      <div class="likert-buttons" id="btns-${item.id}">
        ${[0,1,2,3,4].map(v => `<button class="lk-btn" onclick="onLikert('${storeKey}','${item.id}',${v},this)">${v}</button>`).join('')}
      </div>
    </div>`).join('');
}

/* renderProdScales(si)
   Genera la griglia Likert 1–7 per le 6 domande di PROD_SCALES
   relative al prodotto all'indice si della sequenza.
   L'id dei bottoni include si per evitare collisioni tra prodotti diversi
   (es. "btns-0-q_quality1" vs "btns-1-q_quality1"). */
function renderProdScales(si) {
  return PROD_SCALES.map(s => `
    <div class="scale-item">
      <div class="scale-construct">${s.label}</div>
      <p class="scale-question">${s.q}</p>
      <div class="likert-labels">
        <span class="likert-label">Per niente d'accordo</span>
        <span class="likert-label">Completamente d'accordo</span>
      </div>
      <div class="likert-buttons" id="btns-${si}-${s.id}">
        ${[1,2,3,4,5,6,7].map(v =>
          `<button class="lk-btn" onclick="onStimulusLikert(${si},'${s.id}',${v},this)">${v}</button>`
        ).join('')}
      </div>
    </div>`
  ).join('');
}

/* ================================================================
   8. EVENT HANDLERS – QUESTIONARIO
   ─────────────────────────────────────────────────────────────────
   Gestiscono l'interazione con i controlli delle sezioni standard
   del questionario (prima e dopo la parte sperimentale).
================================================================ */

/* onRadio(groupId, storeKey, subKey, val, btn)
   Aggiorna la selezione visiva (classe 'selected') sul bottone cliccato,
   deseleziona gli altri nel gruppo, salva val in S[storeKey][subKey]
   e chiama checkDone() per aggiornare il pulsante "Avanti". */
function onRadio(groupId, storeKey, subKey, val, btn) {
  document.querySelectorAll('#' + groupId + ' .radio-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  S[storeKey][subKey] = val;
  if (typeof checkDone === 'function') checkDone();
}

/* onLikert(storeKey, id, val, btn)
   Analogo a onRadio per i bottoni Likert: deseleziona gli altri
   bottoni del gruppo (identificato da "btns-<id>"), seleziona quello
   cliccato e salva il valore numerico in S[storeKey][id]. */
function onLikert(storeKey, id, val, btn) {
  document.querySelectorAll('#btns-' + id + ' .lk-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  S[storeKey][id] = val;
  if (typeof checkDone === 'function') checkDone();
}

/* onHealthCheck(cb)
   Gestisce la logica di esclusività della checkbox "Nessuno dei precedenti":
   se selezionata, deseleziona tutte le altre; se viene selezionata un'altra
   opzione, deseleziona "Nessuno dei precedenti".
   Aggiorna S.demographics.health con l'array dei valori attualmente checked. */
function onHealthCheck(cb) {
  if (cb.value === 'Nessuno dei precedenti' && cb.checked) {
    document.querySelectorAll('.health-cb').forEach(c => { if (c.value !== 'Nessuno dei precedenti') c.checked = false; });
    S.demographics.health = ['Nessuno dei precedenti'];
  } else {
    const noneBox = document.querySelector('.health-cb[value="Nessuno dei precedenti"]');
    if (noneBox) noneBox.checked = false;
    S.demographics.health = Array.from(document.querySelectorAll('.health-cb'))
      .filter(c => c.checked && c.value !== 'Nessuno dei precedenti')
      .map(c => c.value);
  }
}

/* ================================================================
   9. EVENT HANDLERS – STIMOLI
   ─────────────────────────────────────────────────────────────────
   Gestiscono le interazioni sulla schermata di valutazione prodotto:
   risposta alle scale Likert e click sul badge QR.
================================================================ */

/* onStimulusLikert(si, id, val, btn)
   Salva la risposta alla domanda di scala id per il prodotto si.
   Dopo ogni risposta chiama checkStimulusDone per aggiornare il pulsante. */
function onStimulusLikert(si, id, val, btn) {
  document.querySelectorAll(`#btns-${si}-${id} .lk-btn`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  S.stimuli[si].responses[id] = val;
  checkStimulusDone(si);
}

/* checkStimulusDone(si)
   Verifica se tutti e 6 gli item di PROD_SCALES hanno una risposta per il prodotto si.
   – Abilita/disabilita il pulsante "Avanti" (#btn-sn-<si>)
   – Aggiorna il testo dell'hint di navigazione (#nh-<si>)
   – Se completato, registra il tempo di esposizione (ms dall'apertura della card) */
function checkStimulusDone(si) {
  const done = PROD_SCALES.every(s => S.stimuli[si].responses[s.id] !== undefined);
  const btn  = document.getElementById(`btn-sn-${si}`);
  const hint = document.getElementById(`nh-${si}`);
  if (!btn) return;
  btn.disabled = !done;
  if (hint) {
    hint.textContent = done ? 'Tutto completato, puoi procedere.' : 'Completa tutte le risposte per continuare';
    hint.className   = 'nav-hint' + (done ? ' complete' : '');
  }
  if (done) S.stimuli[si].exposure_ms = Date.now() - (S.stimuli[si].shown_at || Date.now());
}

/* onQrClick(si)
   Registra il click sul badge QR del prodotto si, aggiorna la nota
   testuale e apre il modal inline con la pagina della condizione. */
function onQrClick(si) {
  const ts = Date.now();
  S.stimuli[si].qr_clicked  = true;
  S.stimuli[si].qr_click_ts = ts;
  const note = document.getElementById(`qr-note-${si}`);
  if (note) {
    note.textContent = '✓ Informazioni aperte — chiudi il pannello per continuare';
    note.style.color = 'var(--text-success)';
  }
  saveData();
  openQRModal();
}

/* openQRModal()
   Carica la pagina della condizione sperimentale (es. V3_Nutraceutiche.html)
   nell'iframe e mostra il modal. Blocca lo scroll del body. */
function openQRModal() {
  document.getElementById('qr-iframe').src = S.condition + '.html';
  document.getElementById('qr-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

/* closeQRModal()
   Nasconde il modal, scarica l'iframe (src='') per liberare memoria
   e ripristina lo scroll del body. */
function closeQRModal() {
  document.getElementById('qr-modal').classList.remove('open');
  document.getElementById('qr-iframe').src = '';
  document.body.style.overflow = '';
}

/* onRadioPost(groupId, key, val, btn)

function onRadioPost(groupId, key, val, btn) {

  btn.classList.add('selected');

/* togglePostQR(val)

function togglePostQR(val) {
  const block = document.getElementById('post-qr-block');
  if (block) block.style.display = val === 'Sì' ? 'block' : 'none';
}

/* onPostLikert(key, val, btn)
   Gestisce il click sulla scala di utilità del QR in sezione post.

function onPostLikert(key, val, btn) {
  document.querySelectorAll('#btns-post-util .lk-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

/* ================================================================
   11. SCREENS
   ─────────────────────────────────────────────────────────────────
   Ogni funzione screen* restituisce una stringa HTML che goTo()

/* screenStimulus(si)
   Sezione D – schermata di valutazione per il prodotto all'indice si.
   Mostra: immagine prodotto (con badge QR cliccabile se hasQR=true),
   6 scale Likert 1–7, slider WTP (€2–€12).
   Il timestamp di apertura viene registrato in goToStimulus().
   Parametro: si – indice 0-based del prodotto in S.sequence. */
function screenStimulus(si) {
  const prod  = S.sequence[si];
  const total = S.sequence.length;
  const pct   = Math.round(((5 + (si + 1) / total) / TOTAL_SECTIONS) * 100);
  /* qrUrl non è più usato per navigazione (il modal carica S.condition + '.html'),
     ma viene conservato per eventuale logging futuro */
  // const qrUrl = `${STUDY_URL}/${S.condition}?pid=${S.participant_id}&sid=${prod.id}`;

  return `<div class="stim-wrap">
    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span class="progress-label">Sezione 6 di ${TOTAL_SECTIONS} · Prodotto ${si+1} di ${total}</span>
        <span class="progress-label">${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="section-header">
      <div class="study-badge">Sezione D – Valutazione prodotti</div>
      <h2>Osserva il prodotto e rispondi alle domande</h2>
    </div>

    <div class="stimulus-card">
      <div class="stimulus-img">
        ${illo(prod.type)}
        ${prod.hasQR ? `
          <button class="qr-badge"
             title="Clicca per maggiori informazioni" onclick="onQrClick(${si})">
            ${QR_SVG}
          </button>` : ''}
      </div>
      <div class="stimulus-meta">
        <p class="stimulus-hint">Osserva attentamente questo prodotto e rispondi alle domande qui sotto.</p>
        ${prod.hasQR
          ? `<span class="qr-note" id="qr-note-${si}">↗ Clicca sul QR per maggiori informazioni sul prodotto</span>`
          : ''}
      </div>
    </div>

    <div class="section-title">Valuta il prodotto</div>
    ${renderProdScales(si)}

    <div class="wtp-wrap">
      <div class="scale-construct">Disponibilità a pagare</div>
      <p class="question-text">Qual è il prezzo massimo che pagheresti per questo prodotto?</p>
      <!-- range 0–1200 centesimi (€2–€12); il valore è diviso per 100 al momento della visualizzazione -->
      <div class="wtp-slider-row">
        <span class="wtp-bound">€0</span>
        <input type="range" min="0" max="1200" step="10" value="0"
          oninput="S.stimuli[${si}].wtp=+this.value;document.getElementById('wtp-d-${si}').textContent='€'+(this.value/100).toFixed(2).replace('.',',')">
        <span class="wtp-bound">€12</span>
        <span class="wtp-value" id="wtp-d-${si}">€0,00</span>
      </div>
    </div>

    <div class="nav-row">
      <span class="nav-hint" id="nh-${si}">Completa tutte le risposte per continuare</span>
      <button class="btn-primary" id="btn-sn-${si}" disabled
        onclick="${si < total - 1 ? `goToStimulus(${si+1})` : `goTo('post')`}">
        ${si < total - 1 ? 'Prodotto successivo →' : 'Sezione successiva →'}
      </button>
    </div>
  </div>`;
}

/* ================================================================
   12. NAVIGAZIONE
   ─────────────────────────────────────────────────────────────────
   SCREENS mappa nomi-schermata → funzioni screen*.
   goTo() e goToStimulus() sono gli unici punti di ingresso per
   cambiare schermata: azzerano checkDone, iniettano HTML in #app
   e riportano la pagina in cima.
================================================================ */

/* Registro di tutte le schermate (nome → funzione generatrice) */
const SCREENS = {
  welcome:      screenWelcome,
  screening:    screenScreening,
  screenout:    screenScreenout,
  sectionB:     screenSectionB,
  fcq:          screenFCQ,
  isd:          screenISD,
  trust:        screenTrust,
  post:         screenPost,
  qr_basic:     screenQRBasic,
  cns:          screenCNS,
  tam:          screenTAM,
  mavenism:     screenMavenism,
  demographics: screenDemographics,
  end:          screenEnd,
};

/* goTo(screen)
   Naviga alla schermata denominata (chiave di SCREENS).
   Se screen === 'end': registra completed_at, salva in localStorage, renderizza
   la schermata, poi chiama submitData() (dopo il render così #send-status esiste). */
function goTo(screen) {
  checkDone = null;
  if (screen === 'end') {
    S.completed_at = new Date().toISOString();
    saveData();
  }
  const fn = SCREENS[screen] || screenWelcome;
  document.getElementById('app').innerHTML = fn();
  window.scrollTo(0, 0);
  if (screen === 'end') submitData();
}

/* goToStimulus(si)
   Naviga alla schermata prodotto all'indice si.
   Registra shown_at per misurare il tempo di esposizione successivamente.
   Se si >= lunghezza della sequenza, reindirizza a 'post'. */
function goToStimulus(si) {
  checkDone = null;
  if (si >= S.sequence.length) { goTo('post'); return; }
  S.stimuli[si].shown_at = Date.now();
  document.getElementById('app').innerHTML = screenStimulus(si);
  window.scrollTo(0, 0);
}

/* ================================================================
   13. SALVATAGGIO DATI
   ─────────────────────────────────────────────────────────────────
   Tre livelli di persistenza, in ordine di affidabilità decrescente:
   1. submitData() → Google Apps Script Web App → Google Sheet (automatico)
   2. saveData()   → localStorage del browser (backup locale per tutta la sessione)
   3. downloadData() → file JSON scaricato dal partecipante (backup manuale)
================================================================ */

/* saveData()
   Serializza S in JSON e lo salva in localStorage con chiave 'survey_<pid>'.
   Il try/catch ignora silenziosamente errori (es. modalità privata, storage pieno). */
function saveData() {
  try { localStorage.setItem('survey_' + S.pid, JSON.stringify(S)); } catch(e) {}
}

/* submitData()
   Invia S in JSON al Web App GAS via POST con mode:'no-cors' (fire-and-forget).
   'no-cors' evita il preflight CORS: il browser manda la richiesta senza aspettare
   un header Access-Control-Allow-Origin. La promise si risolve appena la richiesta
   parte, non quando il server risponde — quindi non possiamo leggere la risposta,
   ma possiamo aggiornare #send-status per dare un feedback visivo minimo.
   Il localStorage rimane copia di backup in caso di errore di rete. */
function submitData() {
  if (!GAS_URL) return;
  const el = document.getElementById('send-status');
  if (el) el.textContent = 'Invio in corso…';
  try {
    fetch(GAS_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify(S),
    })
    .then(() => {
      if (el) { el.textContent = '✓ Dati inviati.'; el.style.color = 'var(--text-success)'; }
    })
    .catch(() => {
      if (el) { el.textContent = 'Invio non riuscito — usa il download qui sotto.'; el.style.color = '#c0392b'; }
    });
  } catch(e) {
    if (el) { el.textContent = 'Invio non riuscito — usa il download qui sotto.'; el.style.color = '#c0392b'; }
  }
}

/* downloadData()
   Crea un Blob JSON e lo scarica come file 'survey_<pid>.json' tramite
   un link <a> temporaneo. Revoca l'object URL dopo il click per liberare memoria. */
function downloadData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], {type: 'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'survey_' + S.pid + '.json'; a.click();
  URL.revokeObjectURL(url);
}

/* ================================================================
   14. TOAST – notifica temporanea
================================================================ */

/* showToast(msg)
   Mostra msg nel pannello #toast per 3 secondi poi lo nasconde.
   Cancella il timeout precedente prima di impostarne uno nuovo,
   così click rapidi in successione resettano il conto alla rovescia. */
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

   15. BOOTSTRAP – avvio applicazione
================================================================ */
initSession();
goTo('welcome');

/* ================================================================
   16. DEV NAV (solo con ?dev nell'URL)
   ─────────────────────────────────────────────────────────────────
   Barra di navigazione rapida fissa in basso, visibile solo in sviluppo.
   Permette di saltare a qualsiasi schermata senza compilare il questionario.
   Ogni click chiama initSession() per reinizializzare S e garantire
   che stimuli[si] esista quando si naviga direttamente a uno stimolo.
================================================================ */
if (new URLSearchParams(location.search).has('dev')) {
  const DEV_SCREENS = [
    ['welcome','Welcome'],['screening','A – Screening'],['screenout','Screenout'],
    ['sectionB','B – Acquisti'],['fcq','C1 – FCQ'],['isd','C2 – ISD'],
    ['trust','C3 – Trust'],
    ...Array.from({length:4},(_,i) => [`__stim${i}`,`D – Prodotto ${i+1}`]),
    ['post','D – Post'],['qr_basic','E1 – QR Basic'],['cns','E2 – CNS'],
    ['tam','E3 – TAM'],['mavenism','E4 – Maven'],['demographics','Dati demo'],['end','Fine'],
  ];
  const nav = document.createElement('div');
  nav.style.cssText = 'position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:9999;background:#1a1a18;border-radius:10px;padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px;max-width:95vw;box-shadow:0 4px 20px rgba(0,0,0,0.35)';
  nav.innerHTML = '<span style="color:#9a9a94;font-size:11px;font-weight:600;letter-spacing:.07em;align-self:center;margin-right:4px">DEV</span>' +
    DEV_SCREENS.map(([id, label]) => {
      const isStim = id.startsWith('__stim');
      const si = isStim ? parseInt(id.replace('__stim','')) : null;
      /* reinizializza sempre la sessione per evitare stati inconsistenti */
      const action = isStim
        ? `initSession();goToStimulus(${si})`
        : `initSession();goTo('${id}')`;
      return `<button onclick="${action}" style="padding:4px 10px;font-size:12px;font-family:var(--font);background:#2e2e2b;color:#f0ede8;border:0.5px solid rgba(255,255,255,0.15);border-radius:6px;cursor:pointer;white-space:nowrap">${label}</button>`;
    }).join('');
  document.body.appendChild(nav);
}
</script>
