<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Matematica finanziaria applicata alla viticoltura</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .wrap { max-width: 700px; width: 100%; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .title { font-size: 13px; font-weight: 600; color: #185fa5; letter-spacing: .08em; text-transform: uppercase; }
  .badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: #0c447c; color: #b5d4f4; font-weight: 600; }

  /* Progress */
  .progress-bar { height: 4px; background: #cfe0f5; border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 4px; background: #185fa5; border-radius: 2px; transition: width .4s ease; }

  /* Card */
  .card { background: #fff; border-radius: 14px; border: 1px solid #d4e4f5; padding: 2rem; box-shadow: 0 2px 12px rgba(24,95,165,.07); }

  /* Counter & category */
  .counter { font-size: 12px; color: #9ab0c8; margin-bottom: 0.6rem; }
  .category { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 5px; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: .05em; }
  .cat-intro  { background: #e6f1fb; color: #185fa5; }
  .cat-micro  { background: #eaf3de; color: #3b6d11; }
  .cat-micro2 { background: #fff3d6; color: #7a4f00; }

  /* Question */
  .question { font-size: 17px; font-weight: 600; color: #0c2a45; line-height: 1.55; margin-bottom: 1.25rem; }

  /* Options */
  .opts { display: flex; flex-direction: column; gap: 10px; }
  .opt { background: #f5f9fe; border: 1.5px solid #d4e4f5; border-radius: 10px; padding: 13px 16px; font-size: 15px; color: #0c2a45; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px; transition: border-color .15s, background .15s; }
  .opt:hover:not(:disabled) { border-color: #185fa5; background: #e6f1fb; }
  .opt .letter { font-size: 12px; font-weight: 700; width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #b5d4f4; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #378add; }
  .opt.correct { border-color: #3b6d11; background: #eaf3de; }
  .opt.correct .letter { background: #3b6d11; color: #fff; border-color: #3b6d11; }
  .opt.wrong { border-color: #a32d2d; background: #fcebeb; }
  .opt.wrong .letter { background: #a32d2d; color: #fff; border-color: #a32d2d; }
  .opt:disabled { cursor: default; }

  /* Feedback */
  .feedback { margin-top: 1rem; font-size: 14px; padding: 12px 16px; border-radius: 10px; border-left: 4px solid; line-height: 1.6; display: none; }
  .fb-ok { background: #eaf3de; border-color: #3b6d11; color: #27500a; }
  .fb-ko { background: #fcebeb; border-color: #a32d2d; color: #791f1f; }

  /* Next button */
  .btn-next { margin-top: 1.25rem; padding: 11px 26px; border-radius: 10px; background: #185fa5; color: #e6f1fb; border: none; font-size: 15px; font-weight: 600; cursor: pointer; display: none; }
  .btn-next:hover { background: #0c447c; }

  /* Result */
  .result { text-align: center; padding: 1rem 0; }
  .score-big { font-size: 64px; font-weight: 700; color: #185fa5; line-height: 1; margin-bottom: 0.4rem; }
  .score-sub { font-size: 15px; color: #7a9abf; margin-bottom: 1rem; }
  .stars { font-size: 28px; letter-spacing: 5px; margin-bottom: 1rem; color: #c8901a; }
  .msg { font-size: 15px; color: #0c2a45; margin-bottom: 2rem; line-height: 1.65; max-width: 500px; margin-left: auto; margin-right: auto; }
  .recap { background: #f5f9fe; border-radius: 10px; padding: 1.25rem; text-align: left; margin-bottom: 1.5rem; border: 1px solid #d4e4f5; }
  .recap-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #e8f0f8; gap: 12px; }
  .recap-row:last-child { border: none; }
  .recap-text { color: #2a4a6a; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .ok { color: #3b6d11; font-weight: 700; flex-shrink: 0; }
  .ko { color: #a32d2d; font-weight: 700; flex-shrink: 0; }
  .btn-restart { padding: 11px 30px; border-radius: 10px; background: #185fa5; color: #e6f1fb; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-restart:hover { background: #0c447c; }

  /* Footer */
  .footer { text-align: center; margin-top: 1.5rem; font-size: 12px; color: #9ab0c8; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span class="title">Economia dell'Impresa Vitivinicola</span>
    <span class="badge">Quiz</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  <div class="card" id="quiz-area"></div>
  <div class="footer">Dott. Antonio Paparella Ph.D. &nbsp;·&nbsp; Matematica finanziaria applicata alla viticoltura</div>
</div>

<script>

const questions = [
  {
    cat: "intro", catLabel: "Matematica finanziaria",
    q: "Un viticoltore investe €50.000 in un fondo di liquidità per acquistare nuovi macchinari. Il capitale rimane depositato per 8 mesi a un tasso di interesse semplice del 5% annuo.<br><br>Quale interesse matura al termine dei 8 mesi?",
    opts: [
      "€2.500,00",
      "€1.666,67",
      "€833,33",
      "€3.333,33"
    ],
    ans: 1,
    fb: "I = C₀ · r · n = 50.000 × 0,05 × 8/12 = 1.666,67 €"
  },
  {
    cat: "intro", catLabel: "Matematica finanziaria",
    q: "Una cantina sociale deposita €80.000 in un conto vincolato al tasso del 3% annuo composto per 6 anni, con l'obiettivo di finanziare il rinnovo della sala di affinamento.<br><br>Qual è il montante accumulato alla fine del periodo?",
    opts: [
      "€95.524,18",
      "€96.800,00",
      "€94.600,00",
      "€102.000,00"
    ],
    ans: 0,
    fb: "Cn = C₀ · (1+i)ⁿ = 80.000 × (1,03)⁶ = 95.524,18 €"
  },
  {
    cat: "intro", catLabel: "Matematica finanziaria",
    q: "Un produttore di Barolo prevede di incassare €120.000 tra 4 anni dalla vendita di una partita di vino attualmente in affinamento. Il tasso di interesse di mercato è del 4% annuo.<br><br>Qual è il valore attuale di questa somma futura?",
    opts: [
      "€102.576,15",
      "€103.200,00",
      "€98.800,00",
      "€107.400,00"
    ],
    ans: 0,
    fb: "C₀ = Cn / (1+i)ⁿ = 120.000 / (1,04)⁴ = 120.000 / 1,16986 = 102.576,15 €"
  },
  
  {
    cat: "intro", catLabel: "Matematica finanziaria",
    q: "Una cooperativa vitivinicola ha contratto un finanziamento di €150.000 per ammodernare la linea di imbottigliamento. Il prestito prevede il rimborso mediante 5 rate annue posticipate uguali, al tasso del 5% annuo.<br><br>Qual è l'importo di ciascuna rata?",
    opts: [
      "€28.700,00",
      "€34.646,22",
      "€31.200,00",
      "€30.000,00"
    ],
    ans: 1,
    fb: "R = C₀ / a₅|₅% = 150.000 * 0,05 * 1,05^5 / (1,05^5-1) = 150.000 * 0,230975 = 34.646,22 €"
  }
];

let cur = 0, score = 0, answered = false;
const history = [];

function catClass(c){ return c==='micro2'?'cat-micro2':c==='micro'?'cat-micro':'cat-intro'; }

function render(){
  const area = document.getElementById('quiz-area');
  document.getElementById('pbar').style.width = (cur / questions.length * 100) + '%';
  if(cur >= questions.length){ showResult(area); return; }
  const q = questions[cur];
  const letters = ['A','B','C','D'];
  area.innerHTML = `
    <div class="counter">Domanda ${cur+1} di ${questions.length}</div>
    <span class="category ${catClass(q.cat)}">${q.catLabel}</span>
    <div class="question">${q.q}</div>
    <div class="opts">
      ${q.opts.map((o,i)=>`
        <button class="opt" id="opt${i}" onclick="pick(${i})">
          <span class="letter">${letters[i]}</span>${o}
        </button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btn-next" onclick="next()">
      ${cur < questions.length-1 ? 'Prossima domanda →' : 'Vedi il risultato →'}
    </button>
  `;
}

function pick(i){
  if(answered) return;
  answered = true;
  const q = questions[cur];
  const correct = i === q.ans;
  if(correct) score++;
  history.push({ q: q.q, ok: correct });
  for(let k=0; k<q.opts.length; k++){
    const btn = document.getElementById('opt'+k);
    btn.disabled = true;
    if(k === q.ans) btn.classList.add('correct');
    else if(k === i && !correct) btn.classList.add('wrong');
  }
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (correct ? 'fb-ok' : 'fb-ko');
  fb.innerHTML = (correct ? '✓ Corretto! ' : '✗ Risposta errata. ') + q.fb;
  fb.style.display = 'block';
  document.getElementById('btn-next').style.display = 'inline-block';
}

function next(){
  cur++;
  answered = false;
  document.getElementById('pbar').style.width = (cur/questions.length*100)+'%';
  render();
}

function getMsg(s,t){
  const p = s/t;
  if(p>=.80) return '🎓 Ottimo! Padroneggi la matematica finanziaria applicata alla viticoltura.';
  if(p>=.60) return '👍 Buon risultato! Ripassa le formule principali e sei pronto/a.';
  if(p>=.40) return '📖 Risultato sufficiente. Rivedi i concetti di interesse, montante e rendita.';
  return '📚 C\'è ancora da lavorare. Rileggi con attenzione le slide di Matematica Finanziaria.';
}

function getStars(s,t){
  const n = Math.round(s/t*5);
  return Array.from({length:5},(_,i)=>i<n?'★':'☆').join('');
}

function showResult(area){
  document.getElementById('pbar').style.width='100%';
  const t = questions.length;
  area.innerHTML = `
    <div class="result">
      <div class="score-big">${score}<span style="font-size:30px;color:#7a9abf">/${t}</span></div>
      <div class="score-sub">risposte corrette su ${t}</div>
      <div class="stars">${getStars(score,t)}</div>
      <p class="msg">${getMsg(score,t)}</p>
      <div class="recap">
        ${history.map((h,i)=>`
          <div class="recap-row">
            <span class="recap-text">${i+1}. ${h.q}</span>
            <span class="${h.ok?'ok':'ko'}">${h.ok?'✓':'✗'}</span>
          </div>`).join('')}
      </div>
      <button class="btn-restart" onclick="restart()">↺ Ricomincia il quiz</button>
    </div>
  `;
}

function restart(){
  cur=0; score=0; answered=false; history.length=0;
  document.getElementById('pbar').style.width='0%';
  render();
}

render();
</script>
</body>
</html>
