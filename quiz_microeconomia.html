<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Microeconomia dell'impresa vitivinicola</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --wine:    #7B1D1D;
    --wine2:   #A33030;
    --gold:    #C8952A;
    --gold2:   #E8B84B;
    --cream:   #F9F4ED;
    --paper:   #F2EBE0;
    --bark:    #3D2B1F;
    --text:    #2A1E14;
    --muted:   #7A6A5A;
    --correct: #2E6B3A;
    --wrong:   #8B1A1A;
    --border:  rgba(61,43,31,0.15);
    --shadow:  0 4px 32px rgba(61,43,31,0.10);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0;
  }

  /* BG decoration */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(123,29,29,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 90% 80%, rgba(200,149,42,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .page { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }

  /* Header */
  header { text-align: center; margin-bottom: 56px; }
  .header-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--gold2);
    padding: 4px 14px;
    border-radius: 2px;
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 600;
    color: var(--bark);
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .subtitle {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  /* Progress bar */
  .progress-wrap { margin-bottom: 40px; }
  .progress-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; font-size: 12px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .progress-track {
    height: 4px; background: var(--paper);
    border-radius: 2px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--wine), var(--gold2));
    border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* Question card */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 36px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    transition: opacity 0.3s, transform 0.3s;
  }
  .card.hidden { display: none; }
  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .card-question {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--bark);
    line-height: 1.55;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s ease;
    background: var(--cream);
    user-select: none;
  }
  .option:hover { border-color: var(--gold2); background: var(--paper); }
  .option.selected { border-color: var(--wine); background: rgba(123,29,29,0.04); }
  .option.correct  { border-color: var(--correct); background: rgba(46,107,58,0.07); }
  .option.wrong    { border-color: var(--wrong);   background: rgba(139,26,26,0.07); }
  .option.disabled { cursor: default; }

  .opt-letter {
    min-width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .option.selected .opt-letter { border-color: var(--wine); color: var(--wine); }
  .option.correct .opt-letter  { border-color: var(--correct); background: var(--correct); color: #fff; }
  .option.wrong .opt-letter    { border-color: var(--wrong);   background: var(--wrong);   color: #fff; }

  .opt-text { font-size: 14px; line-height: 1.55; color: var(--text); padding-top: 3px; }

  /* Feedback */
  .feedback {
    margin-top: 18px; padding: 14px 18px;
    border-radius: 8px; font-size: 13px; line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok  { background: rgba(46,107,58,0.08); border: 1px solid rgba(46,107,58,0.25); color: #1d4a26; }
  .feedback.ko  { background: rgba(139,26,26,0.07); border: 1px solid rgba(139,26,26,0.22); color: #6b1212; }
  .feedback strong { font-weight: 500; }

  /* Nav buttons */
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.04em;
    padding: 10px 24px;
    border-radius: 6px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-primary {
    background: var(--wine); color: #fff;
    border-color: var(--wine);
  }
  .btn-primary:hover { background: var(--wine2); border-color: var(--wine2); }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border-color: var(--border);
  }
  .btn-ghost:hover { border-color: var(--gold2); color: var(--bark); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Results */
  #results { display: none; }
  .result-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .score-ring {
    width: 120px; height: 120px; border-radius: 50%;
    border: 6px solid var(--paper);
    background: conic-gradient(var(--wine) 0deg, var(--gold2) var(--deg, 0deg), var(--paper) var(--deg, 0deg));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    box-shadow: 0 0 0 4px rgba(123,29,29,0.08);
    position: relative;
  }
  .score-inner {
    width: 94px; height: 94px; border-radius: 50%;
    background: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-num {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 600;
    color: var(--wine); line-height: 1;
  }
  .score-denom {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted);
  }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 600;
    color: var(--bark); margin-bottom: 10px;
  }
  .result-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

  /* Result list */
  .result-list { text-align: left; margin-bottom: 32px; }
  .result-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px; line-height: 1.5;
  }
  .result-item:last-child { border-bottom: none; }
  .ri-icon {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0; margin-top: 1px;
  }
  .ri-icon.ok { background: var(--correct); color: #fff; }
  .ri-icon.ko { background: var(--wrong);   color: #fff; }
  .ri-q { color: var(--muted); min-width: 22px; font-family: 'DM Mono', monospace; font-size: 11px; margin-top: 1px; }
  .ri-text { color: var(--text); flex: 1; }
  .ri-correct { color: var(--correct); font-weight: 500; margin-top: 3px; font-size: 12px; }

  .btn-restart {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--wine); color: #fff;
    border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    padding: 12px 32px; cursor: pointer;
    transition: background 0.18s;
  }
  .btn-restart:hover { background: var(--wine2); }

  /* Roman numeral sub-items */
  .sub-opts { margin-top: 4px; }

  @media (max-width: 600px) {
    .card { padding: 24px 20px; }
    .result-card { padding: 32px 20px; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="header-tag">Microeconomia · Quiz</div>
    <h1>Economia dell'impresa vitivinicola</h1>
    <p class="subtitle">9 domande · Rispondi a tutte, poi verifica le soluzioni</p>
  </header>

  <div id="quiz-wrap">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-label">Domanda 1 di 9</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-bar" style="width:0%"></div>
      </div>
    </div>

    <div id="cards-container"></div>

    <div class="nav">
      <button class="btn btn-ghost" id="btn-prev" onclick="navigate(-1)" disabled>← Indietro</button>
      <button class="btn btn-primary" id="btn-next" onclick="navigate(1)">Avanti →</button>
    </div>
  </div>

  <div id="results">
    <div class="result-card">
      <div class="score-ring" id="score-ring">
        <div class="score-inner">
          <div class="score-num" id="score-num">0</div>
          <div class="score-denom">su 9</div>
        </div>
      </div>
      <div class="result-title" id="result-title"></div>
      <div class="result-sub" id="result-sub"></div>
      <div class="result-list" id="result-list"></div>
      <button class="btn-restart" onclick="restart()">↺ &nbsp;Ricomincia</button>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    q: "Il surplus del produttore:",
    opts: [
      { l:"a", t:"è la differenza tra i profitti e i costi di produzione." },
      { l:"b", t:"è la differenza tra i ricavi totali e i costi di produzione." },
      { l:"c", t:"è la disponibilità a pagare meno i costi." }
    ],
    correct: "b",
    explain: "Il surplus del produttore è ciò che il produttore riceve in più rispetto al minimo che sarebbe disposto ad accettare, cioè la differenza tra i ricavi totali e i costi di produzione. Non va confuso con il profitto netto (a) né con la disponibilità a pagare dei consumatori (c)."
  },
  {
    q: "Il surplus del consumatore:",
    opts: [
      { l:"a", t:"è la differenza tra la spesa per il consumo e i ricavi del produttore." },
      { l:"b", t:"è la somma progressiva della disponibilità a pagare." },
      { l:"c", t:"è la differenza tra la disponibilità a pagare e la spesa effettiva." }
    ],
    correct: "c",
    explain: "Il surplus del consumatore misura il \"guadagno\" che il consumatore ottiene: quanto avrebbe pagato (disponibilità a pagare) meno quanto paga effettivamente (prezzo di mercato). Graficamente è il triangolo sopra il prezzo di mercato e sotto la curva di domanda."
  },
  {
    q: "La funzione di domanda per una singola impresa (in concorrenza perfetta):",
    opts: [
      { l:"a", t:"è parallela all'asse orizzontale e parte sempre dal livello del prezzo di mercato." },
      { l:"b", t:"parte dal livello del prezzo di mercato e poi decresce continuamente." },
      { l:"c", t:"è infinitamente rigida e non varia al variare del prezzo perché i produttori sono price-taker." }
    ],
    correct: "a",
    explain: "In concorrenza perfetta l'impresa è price-taker: può vendere qualsiasi quantità al prezzo di mercato, ma nulla a un prezzo superiore. La curva di domanda che affronta è quindi perfettamente elastica (orizzontale) al prezzo P*. La (c) descrive l'offerta dell'impresa, non la domanda."
  },
  {
    q: "Il costo variabile è:",
    opts: [
      { l:"a", t:"sempre crescente." },
      { l:"b", t:"sempre decrescente." },
      { l:"c", t:"ha un andamento ad U." }
    ],
    correct: "a",
    explain: "Il costo variabile totale è sempre crescente all'aumentare della produzione: produrre di più richiede sempre più input variabili (materie prime, lavoro, ecc.). L'andamento a U è tipico dei costi medi (CMe e CVM), non del costo totale o variabile."
  },
  {
    q: "Il costo totale è:",
    opts: [
      { l:"a", t:"sempre crescente." },
      { l:"b", t:"sempre decrescente." },
      { l:"c", t:"ha un andamento ad U." }
    ],
    correct: "a",
    explain: "Il costo totale (CT = CF + CV) è sempre crescente perché è la somma di costi fissi (costanti) e costi variabili (sempre crescenti). Anche qui, l'andamento a U caratterizza i costi medi totali (CMe = CT/Q), non il costo totale."
  },
  {
    q: "Il costo marginale (CMg):",
    opts: [
      { l:"a", t:"è sempre inferiore al costo medio variabile." },
      { l:"b", t:"inizialmente è superiore al costo medio variabile e successivamente inferiore." },
      { l:"c", t:"inizialmente è inferiore al costo medio variabile e successivamente superiore." }
    ],
    correct: "c",
    explain: "Il CMg interseca il CVM nel suo punto minimo: finché CMg < CVM, il costo medio variabile scende; quando CMg > CVM, il CVM risale. Questo è il teorema fondamentale della relazione tra costo marginale e costo medio."
  },
  {
    q: "Il profitto è massimo quando:",
    opts: [
      { l:"a", t:"la differenza fra ricavi totali e costi medi totali è massima." },
      { l:"b", t:"il ricavo marginale è uguale al costo marginale (Rm = Cm)." },
      { l:"c", t:"è massima la produzione." }
    ],
    correct: "b",
    explain: "La condizione di massimizzazione del profitto è Rm = Cm. Finché Rm > Cm conviene aumentare la produzione; quando Rm < Cm, ogni unità aggiuntiva riduce il profitto. La (a) misura il profitto per unità, non il profitto totale; la (c) è sbagliata perché a quantità massima il CMg supera il Rm."
  },
  {
    q: "Il prodotto totale è una funzione che:",
    opts: [
      { l:"a", t:"è sempre crescente." },
      { l:"b", t:"è crescente solo se aumenta il fattore produttivo impiegato." },
      { l:"c", t:"può essere sia crescente che decrescente." }
    ],
    correct: "c",
    explain: "Il prodotto totale cresce inizialmente (rendimenti crescenti per specializzazione), raggiunge un massimo e poi può diminuire (rendimenti decrescenti: aggiungere ulteriori unità di un input variabile a un input fisso riduce la produttività marginale fino a farla diventare negativa)."
  },
  {
    q: "Con εd (elasticità di domanda al prezzo) uguale a −3, un aumento di prezzo del 4%:",
    opts: [
      { l:"i",   t:"fa aumentare la domanda del 3%." },
      { l:"ii",  t:"fa diminuire la domanda del 4%." },
      { l:"iii", t:"fa diminuire la domanda del 12%." }
    ],
    correct: "iii",
    explain: "Dalla formula dell'elasticità: %ΔQ = εd × %ΔP = −3 × 4% = −12%. La domanda diminuisce del 12%. Un'elasticità di −3 indica che la domanda è molto elastica: una variazione del prezzo produce una variazione della quantità tre volte più grande."
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);
let answered = new Array(questions.length).fill(false);

function buildCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? '' : ' hidden');
    card.id = 'card-' + i;
    card.innerHTML = `
      <div class="card-num">Domanda ${i+1} &nbsp;/&nbsp; 9</div>
      <div class="card-question">${q.q}</div>
      <div class="options" id="opts-${i}">
        ${q.opts.map(o => `
          <div class="option" id="opt-${i}-${o.l}" onclick="selectOpt(${i},'${o.l}')">
            <div class="opt-letter">${o.l}</div>
            <div class="opt-text">${o.t}</div>
          </div>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    container.appendChild(card);
  });
}

function selectOpt(qi, letter) {
  if (answered[qi]) return;
  answers[qi] = letter;

  // clear previous selection
  questions[qi].opts.forEach(o => {
    document.getElementById('opt-' + qi + '-' + o.l).classList.remove('selected');
  });
  document.getElementById('opt-' + qi + '-' + letter).classList.add('selected');
  updateNextBtn();
}

function updateNextBtn() {
  const btn = document.getElementById('btn-next');
  const isLast = current === questions.length - 1;
  if (isLast) {
    const allAnswered = answers.every(a => a !== null);
    btn.textContent = allAnswered ? 'Vedi risultati →' : 'Avanti →';
  }
}

function navigate(dir) {
  // confirm answer if moving forward and not yet confirmed
  if (dir === 1 && answers[current] !== null && !answered[current]) {
    confirmAnswer(current);
  }

  const isLast = current === questions.length - 1;
  if (dir === 1 && isLast) {
    // check all answered
    const allAnswered = answers.every(a => a !== null);
    if (!allAnswered) {
      // find first unanswered
      const first = answers.indexOf(null);
      showCard(first);
      return;
    }
    showResults();
    return;
  }

  const next = current + dir;
  if (next < 0 || next >= questions.length) return;
  showCard(next);
}

function confirmAnswer(qi) {
  if (answered[qi]) return;
  if (answers[qi] === null) return;
  answered[qi] = true;

  const q = questions[qi];
  const isCorrect = answers[qi] === q.correct;

  // style options
  questions[qi].opts.forEach(o => {
    const el = document.getElementById('opt-' + qi + '-' + o.l);
    el.classList.add('disabled');
    if (o.l === q.correct) el.classList.add('correct');
    else if (o.l === answers[qi]) el.classList.add('wrong');
  });

  // feedback
  const fb = document.getElementById('fb-' + qi);
  fb.className = 'feedback show ' + (isCorrect ? 'ok' : 'ko');
  fb.innerHTML = (isCorrect
    ? '<strong>✓ Corretto!</strong> '
    : '<strong>✗ Risposta errata.</strong> La risposta corretta è <strong>' + q.correct + '</strong>. ')
    + q.explain;
}

function showCard(idx) {
  document.getElementById('card-' + current).classList.add('hidden');
  current = idx;
  document.getElementById('card-' + current).classList.remove('hidden');

  // update progress
  const answered_count = answered.filter(Boolean).length;
  const pct = Math.round((answered_count / questions.length) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = 'Domanda ' + (current+1) + ' di ' + questions.length;

  // prev/next buttons
  document.getElementById('btn-prev').disabled = (current === 0);
  const isLast = current === questions.length - 1;
  const allAnswered = answers.every(a => a !== null);
  document.getElementById('btn-next').textContent = (isLast && allAnswered) ? 'Vedi risultati →' : 'Avanti →';
}

function showResults() {
  // confirm all remaining
  for (let i = 0; i < questions.length; i++) {
    if (!answered[i] && answers[i] !== null) confirmAnswer(i);
  }

  document.getElementById('quiz-wrap').style.display = 'none';
  document.getElementById('results').style.display = 'block';

  const score = answers.filter((a, i) => a === questions[i].correct).length;

  // score ring
  const deg = Math.round((score / questions.length) * 360);
  document.getElementById('score-ring').style.setProperty('--deg', deg + 'deg');
  document.getElementById('score-num').textContent = score;

  // title
  let title, sub;
  if (score === 9) { title = "Perfetto!"; sub = "Hai risposto correttamente a tutte le domande. Ottima padronanza della microeconomia."; }
  else if (score >= 7) { title = "Molto bene!"; sub = "Hai una solida conoscenza degli argomenti. Ripassati le risposte errate."; }
  else if (score >= 5) { title = "Sufficiente."; sub = "Base discreta, ma ci sono lacune da colmare. Rileggi le spiegazioni."; }
  else { title = "Da rivedere."; sub = "Rivedi i concetti fondamentali di costi, surplus ed elasticità."; }

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;

  // result list
  const list = document.getElementById('result-list');
  list.innerHTML = questions.map((q, i) => {
    const ok = answers[i] === q.correct;
    const chosenOpt = q.opts.find(o => o.l === answers[i]);
    const correctOpt = q.opts.find(o => o.l === q.correct);
    return `
      <div class="result-item">
        <div class="ri-icon ${ok ? 'ok' : 'ko'}">${ok ? '✓' : '✗'}</div>
        <div class="ri-q">${i+1}.</div>
        <div class="ri-text">
          <div>${q.q}</div>
          ${!ok ? `<div class="ri-correct">Risposta corretta: (${q.correct}) ${correctOpt ? correctOpt.t : ''}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  answered = new Array(questions.length).fill(false);
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz-wrap').style.display = 'block';
  buildCards();
  document.getElementById('prog-bar').style.width = '0%';
  document.getElementById('prog-pct').textContent = '0%';
  document.getElementById('prog-label').textContent = 'Domanda 1 di 9';
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next').textContent = 'Avanti →';
