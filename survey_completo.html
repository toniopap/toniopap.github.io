<html lang="it">

    h2 { font-size: 18px; font-weight: 600; margin: 0.5rem 0 0.5rem; }

    .debrief-box { background: var(--bg-sec); border-radius: var(--r-md); padding: 1rem 1.25rem; margin: 1rem 0; font-size: 13px; color: var(--text-sec); line-height: 1.6; }
    .debrief-box p { margin-top: 6px; }
    .debrief-box p:first-child { margin-top: 0; }
    .debrief-title { font-weight: 600; color: var(--text-pri); margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }

    .radio-group { display: flex; flex-direction: column; gap: 6px; }
    .radio-btn { text-align: left; padding: 10px 14px; font-size: 14px; font-family: var(--font); color: var(--text-pri); background: var(--bg); border: 0.5px solid var(--border-mid); border-radius: var(--r-md); cursor: pointer; transition: all 0.12s; }

    .likert-buttons { display: flex; gap: 4px; }
    .lk-btn { flex: 1; height: 36px; border: 0.5px solid var(--border-mid); border-radius: var(--r-md); background: var(--bg); cursor: pointer; font-size: 13px; font-family: var(--font); color: var(--text-sec); transition: all 0.12s; }
    .lk-btn:hover { border-color: var(--border-hi); background: var(--bg-sec); }

    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 1000; background: var(--bg); border: 0.5px solid var(--border-mid); border-radius: var(--r-md); padding: 12px 16px; font-size: 13px; color: var(--text-pri); box-shadow: 0 4px 20px rgba(0,0,0,0.10); opacity: 0; pointer-events: none; transition: opacity 0.2s; max-width: 290px; }

/* ================================================================
   UTILITY – RENDER HELPERS
================================================================ */
function progressBar(section, total) {
  const pct = Math.round((section / total) * 100);
  return `<div class="progress-bar-wrap">
    <div class="progress-meta">
      <span class="progress-label">Sezione ${section} di ${total}</span>
      <span class="progress-label">${pct}%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;
}

function radioGroup(groupId, opts, storeKey, subKey, extra) {
  extra = extra || '';
  return `<div class="radio-group" id="${groupId}">
    ${opts.map(o => `<button class="radio-btn"
      onclick="onRadio('${groupId}','${storeKey}','${subKey}','${o.replace(/'/g, "\\'")}',this)${extra}">${o}</button>`).join('')}
  </div>`;
}

function renderLikert(items, storeKey, n, lowLabel, highLabel, showGroups) {
  let lastGroup = null;
  return items.map(item => {
    let header = '';
    if (showGroups && item.group !== lastGroup) {
      lastGroup = item.group;
      header = `<div class="section-title" style="margin-top:1.5rem">${item.group}</div>`;
    }
    const labelHtml = item.label ? `<div class="scale-construct">${item.label}</div>` : '';
    const vals = Array.from({length: n}, (_, i) => i + 1);
    return `${header}<div class="scale-item">
      ${labelHtml}
      <p class="scale-question">${item.q}</p>
      <div class="likert-labels">
        <span class="likert-label">${lowLabel}</span>
        <span class="likert-label">${highLabel}</span>
      </div>
      <div class="likert-buttons" id="btns-${item.id}">
        ${vals.map(v => `<button class="lk-btn" onclick="onLikert('${storeKey}','${item.id}',${v},this)">${v}</button>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderLikert0(items, storeKey) {
  return items.map((item, idx) => `
    <div class="scale-item">
      <p class="scale-question"><span class="scale-construct">${idx + 1}.</span> ${item.q}</p>
      <div class="likert-labels">
        <span class="likert-label">Mai (0)</span>
        <span class="likert-label">Sempre (4)</span>
      </div>
      <div class="likert-buttons" id="btns-${item.id}">
        ${[0,1,2,3,4].map(v => `<button class="lk-btn" onclick="onLikert('${storeKey}','${item.id}',${v},this)">${v}</button>`).join('')}
      </div>
    </div>`).join('');
}

/* ================================================================
   EVENT HANDLERS
================================================================ */
function onRadio(groupId, storeKey, subKey, val, btn) {
  document.querySelectorAll('#' + groupId + ' .radio-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  S[storeKey][subKey] = val;
  if (typeof checkDone === 'function') checkDone();
}

function onLikert(storeKey, id, val, btn) {
  document.querySelectorAll('#btns-' + id + ' .lk-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  S[storeKey][id] = val;
  if (typeof checkDone === 'function') checkDone();
}

function onHealthCheck(cb) {
  if (cb.value === 'Nessuno dei precedenti' && cb.checked) {
    document.querySelectorAll('.health-cb').forEach(c => { if (c.value !== 'Nessuno dei precedenti') c.checked = false; });
    S.demographics.health = ['Nessuno dei precedenti'];
  } else {
    const noneBox = document.querySelector('.health-cb[value="Nessuno dei precedenti"]');
    if (noneBox) noneBox.checked = false;
    S.demographics.health = Array.from(document.querySelectorAll('.health-cb'))
      .filter(c => c.checked && c.value !== 'Nessuno dei precedenti')
      .map(c => c.value);
  }
}

  screenout:    screenScreenout,
  sectionB:     screenSectionB,
  fcq:          screenFCQ,
  isd:          screenISD,
  trust:        screenTrust,
  qr_basic:     screenQRBasic,
  cns:          screenCNS,
  tam:          screenTAM,
  mavenism:     screenMavenism,
  demographics: screenDemographics,
  end:          screenEnd,
};

function goTo(screen) {
  checkDone = null;
  if (screen === 'end') {
    S.completed_at = new Date().toISOString();
    saveData();
  }
  const fn = SCREENS[screen] || screenWelcome;
  document.getElementById('app').innerHTML = fn();
  window.scrollTo(0, 0);
}

/* ================================================================
   SALVATAGGIO DATI
================================================================ */
function saveData() {
  try { localStorage.setItem('survey_' + S.pid, JSON.stringify(S)); } catch(e) {}
}

function downloadData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], {type: 'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'survey_' + S.pid + '.json'; a.click();
  URL.revokeObjectURL(url);
}

/* ================================================================
   BOOTSTRAP
================================================================ */
initSession();
goTo('welcome');

/* ================================================================
   DEV NAV (solo con ?dev nell'URL)
================================================================ */
if (new URLSearchParams(location.search).has('dev')) {
  const DEV_SCREENS = [
    ['welcome','Welcome'],['screening','A – Screening'],['screenout','Screenout'],
    ['sectionB','B – Acquisti'],['fcq','C1 – FCQ'],['isd','C2 – ISD'],
    ['trust','C3 – Trust'],['qr_basic','D1 – QR Basic'],['cns','D2 – CNS'],
    ['tam','D3 – TAM'],['mavenism','D4 – Mavenism'],['demographics','Dati demo'],['end','Fine'],
  ];
  const nav = document.createElement('div');
  nav.style.cssText = 'position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:9999;background:#1a1a18;border-radius:10px;padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px;max-width:95vw;box-shadow:0 4px 20px rgba(0,0,0,0.35)';
  nav.innerHTML = '<span style="color:#9a9a94;font-size:11px;font-weight:600;letter-spacing:.07em;align-self:center;margin-right:4px">DEV</span>' +
    DEV_SCREENS.map(([id, label]) =>
      `<button onclick="initSession();goTo('${id}')" style="padding:4px 10px;font-size:12px;font-family:var(--font);background:#2e2e2b;color:#f0ede8;border:0.5px solid rgba(255,255,255,0.15);border-radius:6px;cursor:pointer;white-space:nowrap">${label}</button>`
    ).join('');
  document.body.appendChild(nav);
}
</script>
