<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio sul Packaging Alimentare</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #ffffff;
      --bg-sec:       #f6f5f2;
      --bg-ter:       #eeedea;
      --bg-success:   #eaf3de;
      --text-pri:     #1a1a18;
      --text-sec:     #5c5c58;
      --text-ter:     #9a9a94;
      --text-success: #2d7a4f;
      --text-info:    #1a5fa0;
      --border-lo:    rgba(0,0,0,0.09);
      --border-mid:   rgba(0,0,0,0.17);
      --border-hi:    rgba(0,0,0,0.28);
      --r-md: 8px;
      --r-lg: 12px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #1c1c1a;
        --bg-sec:       #252523;
        --bg-ter:       #2e2e2b;
        --bg-success:   #173404;
        --text-pri:     #f0ede8;
        --text-sec:     #a8a8a2;
        --text-ter:     #6a6a64;
        --text-success: #5ec98a;
        --text-info:    #6aabee;
        --border-lo:    rgba(255,255,255,0.08);
        --border-mid:   rgba(255,255,255,0.15);
        --border-hi:    rgba(255,255,255,0.26);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-ter);
      color: var(--text-pri);
      min-height: 100vh;
      padding: 2rem 1rem 6rem;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── LAYOUTS ── */
    .screen-center {
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 1rem;
    }
    .welcome-card {
      background: var(--bg);
      border: 0.5px solid var(--border-lo);
      border-radius: var(--r-lg);
      padding: 2.5rem 2rem;
      max-width: 560px;
      width: 100%;
    }
    .form-wrap, .stim-wrap {
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── TYPOGRAPHY ── */
    h1 { font-size: 22px; font-weight: 600; color: var(--text-pri); margin: 0.6rem 0 1rem; line-height: 1.3; }
    h2 { font-size: 18px; font-weight: 600; color: var(--text-pri); margin: 0.5rem 0 0.5rem; }
    .sub { font-size: 14px; color: var(--text-sec); margin-bottom: 1.5rem; }
    .section-header { margin-bottom: 1.75rem; }
    .section-title {
      font-size: 11px; font-weight: 600; color: var(--text-ter);
      letter-spacing: 0.09em; text-transform: uppercase;
      margin: 1.75rem 0 0.9rem;
    }
    .question-text { font-size: 15px; color: var(--text-pri); margin-bottom: 8px; line-height: 1.45; }

    /* ── BADGE ── */
    .study-badge {
      display: inline-block;
      font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
      background: var(--bg-sec); color: var(--text-ter);
      padding: 4px 10px; border-radius: 20px;
      margin-bottom: 0.4rem;
    }
    .study-badge.ok { background: var(--bg-success); color: var(--text-success); }

    /* ── WELCOME ── */
    .welcome-text { font-size: 15px; color: var(--text-sec); margin-bottom: 1rem; line-height: 1.65; }
    .welcome-text strong { color: var(--text-pri); font-weight: 600; }
    .info-row { display: flex; gap: 1.5rem; margin: 1.5rem 0; flex-wrap: wrap; }
    .info-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-sec); }
    .info-icon { font-size: 16px; }
    .consent-label {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 13px; color: var(--text-sec); line-height: 1.5;
      background: var(--bg-sec); border-radius: var(--r-md);
      padding: 12px; margin-bottom: 1.25rem; cursor: pointer;
    }
    .consent-label input[type=checkbox] { margin-top: 2px; flex-shrink: 0; cursor: pointer; accent-color: var(--text-pri); }
    .debrief-box {
      background: var(--bg-sec); border-radius: var(--r-md);
      padding: 1rem 1.25rem; margin: 1.25rem 0;
      font-size: 14px; color: var(--text-sec); line-height: 1.6;
    }
    .debrief-title { font-weight: 600; color: var(--text-pri); margin-bottom: 6px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; }
    .debrief-box strong { color: var(--text-pri); }

    /* ── FORM ELEMENTS ── */
    .field-group { margin-bottom: 1.4rem; }
    .field-row { display: flex; gap: 1rem; }
    .field-row .field-group { flex: 1; }
    .field-label { display: block; font-size: 14px; font-weight: 500; color: var(--text-pri); margin-bottom: 8px; }
    select, textarea {
      width: 100%; padding: 9px 12px;
      font-size: 14px; font-family: var(--font);
      color: var(--text-pri); background: var(--bg);
      border: 0.5px solid var(--border-mid); border-radius: var(--r-md);
      transition: border-color 0.15s;
    }
    select { height: 40px; cursor: pointer; }
    select:focus, textarea:focus { outline: none; border-color: var(--border-hi); }
    textarea { min-height: 76px; resize: vertical; line-height: 1.5; }
    textarea::placeholder, select option[value=""] { color: var(--text-ter); }

    .radio-group { display: flex; flex-direction: column; gap: 6px; }
    .radio-btn {
      text-align: left; padding: 10px 14px;
      font-size: 14px; font-family: var(--font); color: var(--text-pri);
      background: var(--bg); border: 0.5px solid var(--border-mid);
      border-radius: var(--r-md); cursor: pointer; transition: all 0.12s;
    }
    .radio-btn:hover { background: var(--bg-sec); border-color: var(--border-hi); }
    .radio-btn.selected { background: var(--text-pri); color: var(--bg); border-color: var(--text-pri); font-weight: 500; }

    /* ── PROGRESS BAR ── */
    .progress-bar-wrap { margin-bottom: 1.75rem; }
    .progress-meta { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .progress-label { font-size: 12px; color: var(--text-ter); letter-spacing: 0.07em; text-transform: uppercase; }
    .progress-track { height: 3px; background: var(--border-lo); border-radius: 2px; }
    .progress-fill { height: 3px; background: var(--text-sec); border-radius: 2px; transition: width 0.4s ease; }

    /* ── STIMULUS CARD ── */
    .stimulus-card {
      background: var(--bg); border: 0.5px solid var(--border-lo);
      border-radius: var(--r-lg); overflow: hidden; margin-bottom: 1.5rem;
    }
    .stimulus-img {
      width: 100%; height: 240px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-sec); position: relative;
    }
    .stimulus-meta { padding: 1rem 1.25rem; border-top: 0.5px solid var(--border-lo); }
    .stimulus-hint { font-size: 14px; color: var(--text-sec); line-height: 1.5; }
    .qr-note { display: inline-block; margin-top: 5px; font-size: 12px; color: var(--text-info); cursor: pointer; }

    /* ── QR BADGE ── */
    .qr-badge {
      position: absolute; bottom: 14px; right: 14px;
      width: 50px; height: 50px;
      background: white; border-radius: 8px; border: 1px solid #ddd;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.14s, box-shadow 0.14s;
      text-decoration: none;
    }
    .qr-badge:hover { transform: scale(1.06); box-shadow: 0 2px 12px rgba(0,0,0,0.12); }

    /* ── SCALES ── */
    .scale-item { padding: 1rem 0; border-bottom: 0.5px solid var(--border-lo); }
    .scale-item:last-child { border-bottom: none; }
    .scale-construct { font-size: 11px; font-weight: 600; color: var(--text-ter); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
    .scale-question { font-size: 15px; color: var(--text-pri); margin-bottom: 10px; line-height: 1.4; }
    .likert-labels { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .likert-label { font-size: 11px; color: var(--text-ter); max-width: 100px; line-height: 1.3; }
    .likert-label:last-child { text-align: right; }
    .likert-buttons { display: flex; gap: 5px; }
    .lk-btn {
      flex: 1; height: 38px;
      border: 0.5px solid var(--border-mid); border-radius: var(--r-md);
      background: var(--bg); cursor: pointer;
      font-size: 13px; font-family: var(--font); color: var(--text-sec);
      transition: all 0.12s;
    }
    .lk-btn:hover { border-color: var(--border-hi); background: var(--bg-sec); }
    .lk-btn.selected { background: var(--text-pri); color: var(--bg); border-color: var(--text-pri); font-weight: 600; }

    /* ── WTP SLIDER ── */
    .wtp-wrap { margin-top: 1.5rem; }
    .wtp-slider-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .wtp-bound { font-size: 13px; color: var(--text-ter); white-space: nowrap; }
    input[type=range] { flex: 1; accent-color: var(--text-pri); cursor: pointer; height: 20px; }
    .wtp-value { font-size: 16px; font-weight: 600; color: var(--text-pri); min-width: 60px; text-align: right; }

    /* ── NAVIGATION ── */
    .nav-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 2rem; padding-top: 1.5rem; border-top: 0.5px solid var(--border-lo);
    }
    .nav-hint { font-size: 13px; color: var(--text-ter); transition: color 0.2s; }
    .nav-hint.complete { color: var(--text-success); }
    .btn-primary {
      padding: 10px 26px; font-size: 14px; font-weight: 600; font-family: var(--font);
      background: var(--text-pri); color: var(--bg);
      border: none; border-radius: var(--r-md); cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:disabled { opacity: 0.28; cursor: not-allowed; }
    .btn-primary:not(:disabled):hover { opacity: 0.78; }
    .btn-secondary {
      padding: 10px 20px; font-size: 14px; font-weight: 500; font-family: var(--font);
      background: var(--bg); color: var(--text-pri);
      border: 0.5px solid var(--border-mid); border-radius: var(--r-md); cursor: pointer;
      transition: background 0.15s; display: inline-block; margin-top: 0.75rem;
    }
    .btn-secondary:hover { background: var(--bg-sec); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 1000;
      background: var(--bg); border: 0.5px solid var(--border-mid);
      border-radius: var(--r-md); padding: 12px 16px;
      font-size: 13px; color: var(--text-pri);
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      opacity: 0; pointer-events: none; transition: opacity 0.2s; max-width: 290px;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast"></div>

<script>
/* ==========================================================
   CONFIGURAZIONE — modifica questi valori prima del deploy
========================================================== */
const STUDY_URL = 'https://tuostudio.it/qr'; // URL base landing page QR
// const SHEETS_URL = 'https://script.google.com/macros/s/TUO_ID/exec'; // Google Apps Script

const CONDITIONS = ['tracciabilita', 'nutrizione', 'sostenibilita'];
const ORDERS     = ['A', 'B']; // A = senza QR primo, B = con QR primo

/* ==========================================================
   SCALE LIKERT (identiche per tutti e 6 i prodotti)
========================================================== */
const SCALES = [
  { id: 'q_quality1', label: 'Qualità percepita',     q: 'Questo prodotto mi sembra di alta qualità.'                          },
  { id: 'q_quality2', label: 'Qualità percepita',     q: 'Mi aspetto che questo prodotto sia fresco.'                          },
  { id: 'q_safety',   label: 'Sicurezza alimentare',  q: 'Questo prodotto mi sembra sicuro da consumare.'                      },
  { id: 'q_trust',    label: 'Fiducia',               q: 'Mi fido della provenienza di questo prodotto.'                       },
  { id: 'q_transp',   label: 'Trasparenza',           q: 'Il produttore sembra voler essere trasparente con il consumatore.'   },
  { id: 'q_intent',   label: "Intenzione d'acquisto", q: 'Sarei propenso/a ad acquistare questo prodotto.'                     },
];

/* ==========================================================
   PRODOTTI
========================================================== */
const FILLERS = [
  { id: 'yogurt',  name: 'Yogurt Greco',        brand: 'COOP', detail: '500g · Naturale',       type: 'yogurt',  hasQR: false },
  { id: 'pasta',   name: 'Pasta di Gragnano',   brand: 'COOP',   detail: '500g · Spaghetti n.12', type: 'pasta',   hasQR: false },
  { id: 'passata', name: 'Passata di Pomodoro', brand: 'COOP',      detail: '700g · Rustica',         type: 'passata', hasQR: false },
  { id: 'olio',    name: 'Olio Extravergine',   brand: 'COOP',     detail: '750ml · Classico',       type: 'olio',    hasQR: false },
];
const FOCAL_NO  = { id: 'carne_no_qr', name: 'Fettine di Vitello', brand: 'Linea Natura', detail: '500g · Fresco · IT', type: 'carne', hasQR: false };
const FOCAL_QR  = { id: 'carne_qr',   name: 'Fettine di Vitello', brand: 'Linea Natura', detail: '500g · Fresco · IT', type: 'carne', hasQR: true  };

/* ==========================================================
   STATO GLOBALE
========================================================== */
let S = {};

/* ==========================================================
   INIZIALIZZAZIONE SESSIONE
========================================================== */
function initSession() {
  const condition = CONDITIONS[Math.floor(Math.random() * 3)];
  const order     = ORDERS[Math.floor(Math.random() * 2)];
  const pid       = 'P' + Date.now().toString(36).toUpperCase();

  // Sequenza: filler[0], filler[1], FOCALE-A, filler[2], FOCALE-B, filler[3]
  // Ordine A: SENZA QR in pos 2, CON QR in pos 4
  // Ordine B: CON QR in pos 2, SENZA QR in pos 4
  const fA = order === 'A' ? FOCAL_NO : FOCAL_QR;
  const fB = order === 'A' ? FOCAL_QR : FOCAL_NO;
  const seq = [FILLERS[0], FILLERS[1], fA, FILLERS[2], fB, FILLERS[3]];

  S = {
    participant_id: pid,
    condition,
    order,
    started_at: new Date().toISOString(),
    sequence_ids: seq.map(p => p.id),
    screening: {},
    stimuli: seq.map(p => ({
      stimulus_id:  p.id,
      has_qr:       p.hasQR,
      shown_at:     null,
      exposure_ms:  null,
      qr_clicked:   false,
      qr_click_ts:  null,
      responses:    {},
      wtp:          500,
    })),
    post:         {},
    completed_at: null,
  };
}

/* ==========================================================
   ILLUSTRAZIONI CSS
========================================================== */
function illo(type) {

  const map = {
    yogurt:  `<img src="img/yogurt.jpg"  alt="Yogurt Greco"        style="max-height:190px;max-width:260px;display:block;border-radius:8px;">`,
    pasta:   `<img src="img/pasta.jpg"   alt="Pasta di Gragnano"   style="max-height:190px;max-width:260px;display:block;border-radius:8px;">`,
    passata: `<img src="img/passata.jpg" alt="Passata di Pomodoro" style="max-height:190px;max-width:260px;display:block;border-radius:8px;">`,
    olio:    `<img src="img/olio.jpg"    alt="Olio Extravergine"   style="max-height:190px;max-width:260px;display:block;border-radius:8px;">`,
    carne:   `<img src="img/carne_.png"   alt="Fettine di Vitello confezionate" style="max-height:190px;max-width:260px;display:block;border-radius:8px;">`,
  };
  return `<div style="display:flex;align-items:center;justify-content:center;height:100%;">${map[type]||map.carne}</div>`;
}

const QR_SVG = `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" width="34" height="34" fill="#1a1a18">
  <rect x="2" y="2" width="12" height="12" fill="none" stroke="#1a1a18" stroke-width="2" rx="1"/>
  <rect x="5" y="5" width="6" height="6" rx="0.5"/>
  <rect x="18" y="2" width="12" height="12" fill="none" stroke="#1a1a18" stroke-width="2" rx="1"/>
  <rect x="21" y="5" width="6" height="6" rx="0.5"/>
  <rect x="2" y="18" width="12" height="12" fill="none" stroke="#1a1a18" stroke-width="2" rx="1"/>
  <rect x="5" y="21" width="6" height="6" rx="0.5"/>
  <rect x="18" y="18" width="4" height="4" rx="0.5"/>
  <rect x="24" y="18" width="4" height="4" rx="0.5"/>
  <rect x="18" y="24" width="4" height="4" rx="0.5"/>
  <rect x="24" y="24" width="6" height="6" rx="0.5"/>
</svg>`;

/* ==========================================================
   RENDER SCALE (riutilizzabile)
========================================================== */
function renderScales(si) {
  return SCALES.map(s => `
    <div class="scale-item">
      <div class="scale-construct">${s.label}</div>
      <p class="scale-question">${s.q}</p>
      <div class="likert-labels">
        <span class="likert-label">Per niente d'accordo</span>
        <span class="likert-label">Completamente d'accordo</span>
      </div>
      <div class="likert-buttons" id="btns-${si}-${s.id}">
        ${[1,2,3,4,5,6,7].map(v =>
          `<button class="lk-btn" onclick="onLikert(${si},'${s.id}',${v},this)">${v}</button>`
        ).join('')}
      </div>
    </div>`
  ).join('');
}

/* ==========================================================
   SCREEN: BENVENUTO
========================================================== */
function screenWelcome() {
  return `<div class="screen-center"><div class="welcome-card">
    <div class="study-badge">Studio Accademico</div>
    <h1>Preferenze di Packaging Alimentare</h1>
    <p class="welcome-text">
      Questo studio, condotto nell'ambito di una ricerca universitaria, analizza le
      <strong>preferenze estetiche dei consumatori</strong> rispetto al packaging di prodotti
      alimentari confezionati.
    </p>
    <p class="welcome-text">
      Ti mostreremo alcune immagini di prodotti e ti chiederemo di esprimere le tue opinioni.
      Non esistono risposte giuste o sbagliate — conta solo la tua impressione spontanea.
    </p>
    <div class="info-row">
      <div class="info-item"><span class="info-icon">⏱</span><span>~8 minuti</span></div>
      <div class="info-item"><span class="info-icon">🔒</span><span>Completamente anonimo</span></div>
      <div class="info-item"><span class="info-icon">🎓</span><span>Uso scientifico</span></div>
    </div>
    <label class="consent-label">
      <input type="checkbox" id="consent" onchange="document.getElementById('btn-start').disabled=!this.checked">
      <span>Ho letto l'informativa e acconsento liberamente a partecipare. Posso interrompere in qualsiasi momento senza conseguenze.</span>
    </label>
    <button class="btn-primary" id="btn-start" disabled onclick="goTo('screening')">Inizia lo studio →</button>
  </div></div>`;
}

/* ==========================================================
   SCREEN: SCREENING
========================================================== */
function screenScreening() {
  const rg = (id, key, opts, extra) => `
    <div class="radio-group" id="${id}">
      ${opts.map(o => `<button class="radio-btn"
        onclick="onRadioScreening('${id}','${key}','${o}',this)${extra||''}">${o}</button>`).join('')}
    </div>`;
  return `<div class="form-wrap">
    <div class="section-header">
      <div class="study-badge">Sezione 1 di 3</div>
      <h2>Qualche informazione su di te</h2>
      <p class="sub">Queste domande ci aiutano a contestualizzare le risposte.</p>
    </div>

    <div class="field-group">
      <label class="field-label">Con quale frequenza acquisti carne confezionata?</label>
      ${rg('rg-freq','freq',['Mai','Meno di una volta a settimana','1–2 volte a settimana','3 o più volte a settimana'])}
    </div>

    <div class="field-group">
      <label class="field-label">Con quale frequenza utilizzi QR code su prodotti alimentari?</label>
      ${rg('rg-qr','qr_use',["Mai","Raramente ","Occasionalmente (mensile)","Spesso (settimanale o più)"])}
    </div>

    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Età</label>
        <select id="sel-age" onchange="onSelectScreening('age',this.value)">
          <option value="">— seleziona —</option>
          ${['18–25','26–35','36–45','46–55','56–65','66+'].map(o=>`<option>${o}</option>`).join('')}
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">Genere</label>
        <select id="sel-gender" onchange="onSelectScreening('gender',this.value)">
          <option value="">— seleziona —</option>
          ${['Donna','Uomo','Non binario','Preferisco non rispondere'].map(o=>`<option>${o}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Titolo di studio</label>
      <select id="sel-edu" onchange="onSelectScreening('edu',this.value)">
        <option value="">— seleziona —</option>
        ${['Licenza media','Diploma superiore','Laurea triennale','Laurea magistrale o superiore'].map(o=>`<option>${o}</option>`).join('')}
      </select>
    </div>

    <div class="nav-row">
      <span></span>
      <button class="btn-primary" id="btn-scr-next" disabled onclick="goToStimulus(0)">Avanti →</button>
    </div>
  </div>`;
}

/* ==========================================================
   SCREEN: STIMOLO
========================================================== */
function screenStimulus(si) {
  const prod  = S.sequence[si];
  const total = S.sequence.length;
  const pct   = Math.round(((si + 1) / (total + 2)) * 100);
  const qrUrl = `${STUDY_URL}/${S.condition}?pid=${S.participant_id}&sid=${prod.id}`;

  return `<div class="stim-wrap">
    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span class="progress-label">Prodotto ${si+1} di ${total}</span>
        <span class="progress-label">${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="stimulus-card">
      <div class="stimulus-img">
        ${illo(prod.type)}
        ${prod.hasQR ? `
          <a class="qr-badge" href="${qrUrl}" target="_blank" rel="noopener"
             title="Clicca per maggiori informazioni" onclick="onQrClick(${si})">
            ${QR_SVG}
          </a>` : ''}
      </div>
      <div class="stimulus-meta">
        <p class="stimulus-hint">Osserva attentamente questo prodotto e rispondi alle domande qui sotto.</p>
        ${prod.hasQR
          ? `<span class="qr-note" id="qr-note-${si}">↗ Clicca sul QR per maggiori informazioni sul prodotto</span>`
          : ''}
      </div>
    </div>


    <div class="section-title">Valuta il prodotto</div>
    ${renderScales(si)}

    <div class="wtp-wrap">
      <div class="scale-construct">Disponibilità a pagare</div>
      <p class="question-text">Qual è il prezzo massimo che pagheresti per questo prodotto?</p>
      <div class="wtp-slider-row">
        <span class="wtp-bound">€2</span>
        <input type="range" min="200" max="1200" step="10" value="500"
          oninput="S.stimuli[${si}].wtp=+this.value;document.getElementById('wtp-d-${si}').textContent='€'+(this.value/100).toFixed(2).replace('.',',')">
        <span class="wtp-bound">€12</span>
        <span class="wtp-value" id="wtp-d-${si}">€5,00</span>
      </div>
    </div>

    <div class="nav-row">
      <span class="nav-hint" id="nh-${si}">Completa tutte le risposte per continuare</span>
      <button class="btn-primary" id="btn-sn-${si}" disabled
        onclick="${si < 5 ? `goToStimulus(${si+1})` : `goTo('post')`}">
        ${si < 5 ? 'Prodotto successivo →' : 'Sezione successiva →'}
      </button>
    </div>
  </div>`;
}

/* ==========================================================
   SCREEN: POST-ESPOSIZIONE
========================================================== */
function screenPost() {
  const rg = (id, opts, extra) => `
    <div class="radio-group" id="${id}">
      ${opts.map(o => `<button class="radio-btn"
        onclick="onRadioPost('${id}','${id.replace('rg-','')}','${o}',this)${extra||''}">${o}</button>`).join('')}
    </div>`;
  return `<div class="form-wrap">
    <div class="section-header">
      <div class="study-badge">Sezione 3 di 3</div>
      <h2>Qualche domanda finale</h2>
      <p class="sub">Rispondi liberamente, senza rileggere le immagini precedenti.</p>
    </div>

    <div class="field-group">
      <label class="field-label">Ripensando ai prodotti che hai appena visto, cosa ricordi? Descrivi liberamente.</label>
      <textarea id="post-mem" placeholder="Scrivi qui…" style="min-height:100px"
        oninput="S.post.memory_text=this.value"></textarea>
    </div>

    <div class="field-group">
      <label class="field-label">Hai notato un codice QR su uno dei prodotti?</label>
      ${rg('rg-noticed',['Sì','No','Non ricordo'],";togglePostQR('${o}')")}
    </div>

    <div id="post-qr-block" style="display:none">
      <div class="field-group">
        <label class="field-label">Hai cliccato sul codice QR?</label>
        ${rg('rg-clicked',['Sì','No'],'')}
      </div>
      <div class="field-group">
        <label class="field-label">Cosa ti aspettavi di trovare cliccando il QR?</label>
        <textarea id="post-exp" placeholder="Es: informazioni sull'origine, ingredienti, ricette…"
          oninput="S.post.qr_expected=this.value"></textarea>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Quanto ritieni utile avere un QR code su prodotti alimentari confezionati?</label>
      <div class="likert-labels">
        <span class="likert-label">Per niente utile</span>
        <span class="likert-label">Molto utile</span>
      </div>
      <div class="likert-buttons" id="btns-post-util">
        ${[1,2,3,4,5,6,7].map(v =>
          `<button class="lk-btn" onclick="onPostLikert('qr_usefulness',${v},this)">${v}</button>`
        ).join('')}
      </div>
    </div>

    <div class="nav-row">
      <span></span>
      <button class="btn-primary" onclick="goTo('end')">Completa lo studio →</button>
    </div>
  </div>`;
}

/* ==========================================================
   SCREEN: FINE
========================================================== */
function screenEnd() {
  return `<div class="screen-center"><div class="welcome-card">
    <div class="study-badge ok">Completato</div>
    <h1>Grazie per la tua partecipazione!</h1>
    <p class="welcome-text">Le tue risposte sono state registrate correttamente. Il tuo contributo è molto prezioso per questa ricerca.</p>
    <div class="debrief-box">
      <div class="debrief-title">Informativa post-studio</div>
      <p>Questo studio analizzava in particolare l'effetto dei <strong>codici QR</strong> sulla percezione dei prodotti alimentari confezionati — non solo il loro contenuto informativo, ma anche il semplice fatto di essere presenti sul packaging. Le tue risposte contribuiranno a capire meglio come i segnali visivi influenzano le scelte dei consumatori.</p>
    </div>
    <button class="btn-secondary" onclick="downloadData()">⬇ Scarica i tuoi dati (JSON)</button>
    <p style="font-size:12px;color:var(--text-ter);margin-top:1.25rem;text-align:center;">Puoi chiudere questa scheda.</p>
  </div></div>`;
}

/* ==========================================================
   NAVIGAZIONE
========================================================== */
function goTo(screen) {
  const app = document.getElementById('app');
  if (screen === 'welcome')   app.innerHTML = screenWelcome();
  if (screen === 'screening') app.innerHTML = screenScreening();
  if (screen === 'post')      app.innerHTML = screenPost();
  if (screen === 'end') {
    S.completed_at = new Date().toISOString();
    saveData();
    app.innerHTML = screenEnd();
  }
  window.scrollTo(0, 0);
}

function goToStimulus(si) {
  S.stimuli[si].shown_at = Date.now();
  // Recupera la sequenza (aggiunta a S dopo init)
  document.getElementById('app').innerHTML = screenStimulus(si);
  window.scrollTo(0, 0);
}

/* ==========================================================
   HANDLER INTERAZIONE — SCREENING
========================================================== */
function onRadioScreening(groupId, key, val, btn) {
  document.querySelectorAll(`#${groupId} .radio-btn`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  S.screening[key] = val;
  checkScreeningDone();
}

function onSelectScreening(key, val) {
  if (val) S.screening[key] = val;
  checkScreeningDone();
}

function checkScreeningDone() {
  const ok = S.screening.freq && S.screening.qr_use &&
             S.screening.age  && S.screening.gender && S.screening.edu;
  const btn = document.getElementById('btn-scr-next');
  if (btn) btn.disabled = !ok;
}

/* ==========================================================
   HANDLER INTERAZIONE — STIMOLI
========================================================== */
function onLikert(si, id, val, btn) {
  document.querySelectorAll(`#btns-${si}-${id} .lk-btn`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  S.stimuli[si].responses[id] = val;
  checkStimulusDone(si);
}

function checkStimulusDone(si) {
  const done = SCALES.every(s => S.stimuli[si].responses[s.id] !== undefined);
  const btn  = document.getElementById(`btn-sn-${si}`);
  const hint = document.getElementById(`nh-${si}`);
  if (!btn) return;
  btn.disabled = !done;
  if (hint) {
    hint.textContent = done ? 'Tutto completato, puoi procedere.' : 'Completa tutte le risposte per continuare';
    hint.className   = 'nav-hint' + (done ? ' complete' : '');
  }
  if (done) S.stimuli[si].exposure_ms = Date.now() - (S.stimuli[si].shown_at || Date.now());
}

function onQrClick(si) {
  const ts = Date.now();
  S.stimuli[si].qr_clicked  = true;
  S.stimuli[si].qr_click_ts = ts;
  const note = document.getElementById(`qr-note-${si}`);
  if (note) { note.textContent = '✓ QR aperto alle ' + new Date(ts).toLocaleTimeString('it-IT'); note.style.color = 'var(--text-success)'; }
  showToast('Click sul QR registrato.');
  saveData();
}

/* ==========================================================
   HANDLER INTERAZIONE — POST
========================================================== */
function onRadioPost(groupId, key, val, btn) {
  document.querySelectorAll(`#${groupId} .radio-btn`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  S.post[key] = val;
}

function togglePostQR(val) {
  const block = document.getElementById('post-qr-block');
  if (block) block.style.display = val === 'Sì' ? 'block' : 'none';
}

function onPostLikert(key, val, btn) {
  document.querySelectorAll('#btns-post-util .lk-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  S.post[key] = val;
}

/* ==========================================================
   SALVATAGGIO DATI
========================================================== */
function saveData() {
  // 1. localStorage (backup automatico)
  try { localStorage.setItem('survey_' + S.participant_id, JSON.stringify(S)); } catch(e) {}

  // 2. Google Sheets via Apps Script — decommentare per attivare
  /*
  fetch(SHEETS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(S),
  }).catch(err => console.warn('Sheets sync error:', err));
  */
}

function downloadData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `survey_${S.participant_id}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ==========================================================
   TOAST
========================================================== */
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

/* ==========================================================
   BOOTSTRAP
========================================================== */
// Aggiungi sequence a S dopo init (per accesso in screenStimulus)
const _origInit = initSession;
initSession = function() {
  _origInit();
  // sequence è già in S come stimuli; aggiungiamo reference diretta
  S.sequence = [FILLERS[0], FILLERS[1],
    S.order === 'A' ? FOCAL_NO : FOCAL_QR,
    FILLERS[2],
    S.order === 'A' ? FOCAL_QR : FOCAL_NO,
    FILLERS[3]];
};

initSession();
goTo('welcome');
</script>
</body>
